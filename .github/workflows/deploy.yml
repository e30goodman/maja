name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # No named `environment:` — repo rule "github-pages" often allows only main; deploy-pages works with permissions below.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: maja/package-lock.json
      
      - name: Install dependencies
        working-directory: ./maja
        run: npm ci
      
      - name: Build
        working-directory: ./maja
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './maja/dist'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4






