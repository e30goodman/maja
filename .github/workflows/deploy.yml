name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Queue deployments to avoid GitHub Pages API 400:
  # "due to in progress deployment".
  cancel-in-progress: false

jobs:
  deploy:
    # No named `environment:` — repo rule "github-pages" often allows only main; deploy-pages works with permissions below.
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: konnakol_trainer/package-lock.json
      
      - name: Install dependencies
        working-directory: ./konnakol_trainer
        run: npm ci
      
      - name: Build
        working-directory: ./konnakol_trainer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_APP_COMMIT: ${{ github.sha }}
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare Pages artifact structure
        run: |
          rm -rf pages-artifact
          mkdir -p pages-artifact/konnakol/trainer
          cp -R konnakol_trainer/dist/. pages-artifact/konnakol/trainer/
          cp maja/index.html pages-artifact/index.html
          cp -R maja/public/images pages-artifact/images
          cp maja/public/instagram-icon.png pages-artifact/instagram-icon.png
          cp maja/public/youtube-icon.png pages-artifact/youtube-icon.png
          cp maja/public/promo.html pages-artifact/promo.html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './pages-artifact'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 10000






