name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # No named `environment:` — repo rule "github-pages" often allows only main; deploy-pages works with permissions below.
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: konnakol_trainer/package-lock.json
      
      - name: Install dependencies
        working-directory: ./konnakol_trainer
        run: npm ci
      
      - name: Build
        working-directory: ./konnakol_trainer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Pages artifact structure
        run: |
          rm -rf pages-artifact
          mkdir -p pages-artifact/konnakol/trainer
          cp -R konnakol_trainer/dist/. pages-artifact/konnakol/trainer/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages-artifact'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4






