<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BassMastery - Espace Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-900/20 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-violet-900/20 blur-[100px]"></div>
    </div>

    <main class="relative z-10 max-w-md mx-auto px-4 py-10 md:py-14 flex flex-col items-center gap-8">
        <div class="w-full rounded-2xl overflow-hidden border border-slate-700 shadow-2xl shadow-violet-900/20 bg-black aspect-[9/16]">
            <iframe
                class="w-full h-full"
                src="https://www.youtube.com/embed/w5RbbqGoh0Q?rel=0&modestbranding=1"
                title="BassMastery — Voronka"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
            ></iframe>
        </div>

        <a
            href="https://wa.me/41782205262?text=Bonjour%20Artem!%20J%E2%80%99ai%20vu%20ton%20Espace%20Demo.%20Je%20joue%20de%20la%20basse%20et%20j%E2%80%99aimerais%20avoir%20l%E2%80%99acc%C3%A8s%20complet%20%2F%20Hi%2C%20I%20saw%20your%20demo%20and%20want%20full%20access"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center justify-center gap-2 w-full px-6 py-4 rounded-xl font-semibold text-sm uppercase tracking-wide bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white shadow-lg shadow-emerald-900/40 transition-all hover:scale-[1.02] active:scale-[0.98] border border-emerald-400/30"
        >
            <i data-lucide="message-circle" class="w-5 h-5"></i>
            Écrire sur WhatsApp
        </a>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
