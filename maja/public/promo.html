<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BassMastery - Espace Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-900/20 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-violet-900/20 blur-[100px]"></div>
    </div>

    <main class="relative z-10 max-w-md mx-auto px-4 py-10 md:py-14 flex flex-col items-center gap-8">
        <div class="w-full rounded-2xl overflow-hidden border border-slate-700 shadow-2xl shadow-violet-900/20 bg-black aspect-[9/16]">
            <iframe
                class="w-full h-full"
                src="https://www.youtube.com/embed/w5RbbqGoh0Q?rel=0&modestbranding=1"
                title="BassMastery — Voronka"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
            ></iframe>
        </div>

        <section class="w-full space-y-3">
            <h2 class="text-center text-xs font-bold uppercase tracking-widest text-slate-500">Catégories</h2>
            <div class="flex flex-wrap justify-center gap-2">
                <a href="./promo/jazz-funk.html" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold bg-violet-600/20 text-violet-200 border border-violet-500/40 hover:bg-violet-600/30 hover:border-violet-400/60 transition-colors">Jazz / Funk</a>
                <a href="./promo/fusion.html" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold bg-violet-600/20 text-violet-200 border border-violet-500/40 hover:bg-violet-600/30 hover:border-violet-400/60 transition-colors">Fusion</a>
                <a href="./promo/metal.html" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold bg-violet-600/20 text-violet-200 border border-violet-500/40 hover:bg-violet-600/30 hover:border-violet-400/60 transition-colors">Metal</a>
                <a href="./promo/rock.html" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold bg-violet-600/20 text-violet-200 border border-violet-500/40 hover:bg-violet-600/30 hover:border-violet-400/60 transition-colors">Rock</a>
                <a href="./promo/exercices.html" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold bg-violet-600/20 text-violet-200 border border-violet-500/40 hover:bg-violet-600/30 hover:border-violet-400/60 transition-colors">Exercices</a>
                <a href="./promo/jam.html" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold bg-violet-600/20 text-violet-200 border border-violet-500/40 hover:bg-violet-600/30 hover:border-violet-400/60 transition-colors">Jam / Improvisation</a>
                <a href="./promo/bass-seul.html" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold bg-violet-600/20 text-violet-200 border border-violet-500/40 hover:bg-violet-600/30 hover:border-violet-400/60 transition-colors">Bass seul</a>
            </div>
        </section>

        <div class="w-full">
            <a
                id="whatsapp-cta"
                href="https://api.whatsapp.com/send?phone=41782205262&amp;text=Bonjour%20Artem%2C%20vos%20cours%20m%27int%C3%A9ressent.%20Pourrions-nous%20en%20discuter%20%3F"
                target="_blank"
                rel="noopener noreferrer"
                class="inline-flex items-center justify-center gap-2 w-full px-6 py-4 rounded-xl font-semibold text-sm uppercase tracking-wide bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white shadow-lg shadow-emerald-900/40 transition-all hover:scale-[1.02] active:scale-[0.98] border border-emerald-400/30"
            >
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                Écrire sur WhatsApp
            </a>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
