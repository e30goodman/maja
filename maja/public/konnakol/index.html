<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konnakol Multi-Bar Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Палитра как на Espace Maja (Tailwind slate + violet + blue) */
        :root {
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-500: #64748b;
            --slate-400: #94a3b8;
            --slate-200: #e2e8f0;
            --violet-400: #a78bfa;
            --violet-500: #8b5cf6;
            --violet-600: #7c3aed;
            --blue-600: #2563eb;
            --blue-500: #3b82f6;
            --emerald-500: #10b981;
            --emerald-400: #34d399;
            --rose-500: #f43f5e;
            --rose-400: #fb7185;
            --playback-bg: rgba(244, 63, 94, 0.2);
            --playback-bg-strong: rgba(244, 63, 94, 0.3);
            --playback-border: #fb7185;
            --playback-glow: rgba(244, 63, 94, 0.48);
            --panel: #0f172a;
            --border: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --primary: #8b5cf6;
            --primary-dim: #7c3aed;
            --accent: #10b981;
        }
        html { min-height: 100%; color-scheme: dark; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            background-color: var(--slate-900);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            pointer-events: none;
            z-index: 0;
            width: 50%;
            height: 50%;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
        }
        body::before {
            top: -10%;
            left: -10%;
            background: rgb(30 58 138);
        }
        body::after {
            bottom: -10%;
            right: -10%;
            background: rgb(76 29 149);
        }
        .app-container {
            position: relative;
            z-index: 1;
            background: var(--panel);
            border: 1px solid var(--slate-700);
            padding: 30px;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.08) inset;
            width: 100%;
            max-width: 600px;
        }
        h2 { text-align: center; margin-bottom: 25px; color: var(--text); font-weight: 600; letter-spacing: 0.02em; }

        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .settings-fold {
            margin: 10px 0 14px;
            border: 1px solid var(--slate-700);
            border-radius: 0.75rem;
            background: rgba(30, 41, 59, 0.28);
            overflow: hidden;
        }
        .settings-fold summary {
            cursor: pointer;
            list-style: none;
            font-weight: 700;
            color: var(--text);
            padding: 12px 14px;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid transparent;
            user-select: none;
        }
        .settings-fold[open] summary { border-bottom-color: var(--slate-700); }
        .settings-fold summary::-webkit-details-marker { display: none; }
        .settings-fold-content { padding: 14px 14px 6px; }
        .control-group {
            margin: 12px 0;
            padding: 10px 12px;
            border: 1px solid var(--slate-700);
            border-radius: 0.75rem;
            background: rgba(30, 41, 59, 0.35);
        }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: var(--text-muted); }
        label .hint-muted { font-weight: 400; color: var(--text-dim); }
        select, input[type="range"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 0.75rem;
            border: 1px solid var(--slate-700);
            background: var(--slate-800);
            color: var(--text);
        }
        select { cursor: pointer; }
        select:focus, input[type="range"]:focus {
            outline: none;
            border-color: var(--violet-500);
        }
        input[type="range"] { padding: 0; height: 1.25rem; accent-color: var(--violet-600); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--slate-800); }
        ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5b21b6; }

        .bars-container {
            --bars-count: 4;
            --bar-height: 96px;
            --cell-height: 62px;
            --bars-gap: 16px;
            --bar-scale: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: calc(var(--bars-gap) * var(--bar-scale));
            margin: 25px 0;
        }
        .bars-container.many-bars { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .bar {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--slate-700);
            padding: calc(clamp(10px, calc(19px - (var(--bars-count) * 1px)), 15px) * var(--bar-scale));
            border-radius: calc(1rem * var(--bar-scale));
            min-height: calc(var(--bar-height) * var(--bar-scale));
        }
        .bar-title { font-size: calc(0.75rem * var(--bar-scale)); font-weight: bold; color: var(--text-dim); margin-bottom: calc(10px * var(--bar-scale)); text-transform: uppercase; letter-spacing: 0.06em; }
        .pulsation-handle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 6px;
            min-width: calc(32px * var(--bar-scale));
            height: calc(22px * var(--bar-scale));
            padding: 0 calc(8px * var(--bar-scale));
            border-radius: calc(999px * var(--bar-scale));
            border: 1px solid rgba(139, 92, 246, 0.55);
            background: rgba(124, 58, 237, 0.16);
            color: #c4b5fd;
            cursor: pointer;
            user-select: none;
            touch-action: none;
            font-weight: 700;
            line-height: 1;
            transition: transform 0.12s ease, color 0.12s ease, text-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
        }
        .pulsation-handle:hover {
            background: rgba(139, 92, 246, 0.24);
            border-color: rgba(196, 181, 253, 0.82);
        }
        .pulsation-handle.dragging {
            color: #c4b5fd;
            transform: scale(1.12);
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
            background: rgba(139, 92, 246, 0.3);
            border-color: rgba(196, 181, 253, 0.95);
        }

        .pulsation-drag-panel {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 60;
            width: min(120px, 34vw);
            max-height: min(48vh, 280px);
            overflow-y: auto;
            padding: 8px;
            border-radius: 0.6rem;
            border: 1px solid var(--slate-600);
            background: rgba(15, 23, 42, 0.92);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(139, 92, 246, 0.15) inset;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text);
            font-size: 0.72rem;
            pointer-events: auto;
        }
        .pulsation-drag-panel[hidden] { display: none !important; }
        .pulsation-drag-panel-title {
            font-weight: 700;
            font-size: 0.64rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .pulsation-drag-panel-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .pulsation-drag-panel-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 5px 7px;
            margin-bottom: 3px;
            border-radius: 0.5rem;
            background: rgba(30, 41, 59, 0.55);
            border: 1px solid transparent;
            font-variant-numeric: tabular-nums;
            cursor: pointer;
        }
        .pulsation-drag-panel-list li.active {
            border-color: var(--violet-500);
            background: rgba(124, 58, 237, 0.2);
            color: var(--text);
        }
        .pulsation-drag-panel-list .p-label { font-weight: 700; color: var(--text-muted); }
        .pulsation-drag-panel-list li.active .p-label { color: var(--violet-400); }

        .rhythm-grid {
            display: flex;
            flex-wrap: wrap;
            gap: calc(clamp(5px, calc(10px - (var(--bars-count) * 0.4px)), 8px) * var(--bar-scale));
            justify-content: flex-start;
        }
        .cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--slate-800);
            padding: calc(clamp(6px, calc(10px - (var(--bars-count) * 0.45px)), 8px) * var(--bar-scale));
            border-radius: calc(0.5rem * var(--bar-scale));
            width: calc(clamp(32px, calc(48px - (var(--bars-count) * 1.45px)), 42px) * var(--bar-scale));
            min-height: calc(var(--cell-height) * var(--bar-scale));
            transition: 0.1s;
            border: 2px solid transparent;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .cell:focus-visible {
            outline: 2px solid var(--violet-400);
            outline-offset: 2px;
        }
        .cell small {
            font-size: calc(clamp(0.55rem, calc(0.74rem - (var(--bars-count) * 0.015rem)), 0.65rem) * var(--bar-scale));
            margin-bottom: 0;
            font-weight: 600;
            color: var(--text-muted);
        }
        .cell.rhythm-note-on {
            border-color: var(--violet-500);
            background: rgba(124, 58, 237, 0.22);
            color: var(--text);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.25);
        }
        .cell.rhythm-note-on small {
            color: var(--text);
        }
        .cell.playing {
            background: var(--playback-bg);
            color: var(--text);
            border-color: var(--playback-border);
            box-shadow: 0 0 14px var(--playback-glow);
            transform: translateY(-2px);
        }
        .cell.playing small {
            color: #fecdd3;
        }
        .cell.rhythm-note-on.playing {
            background: var(--playback-bg-strong);
            border-color: var(--rose-500);
            box-shadow: 0 0 18px rgba(244, 63, 94, 0.58), 0 0 0 1px rgba(251, 113, 133, 0.35) inset;
        }
        .cell.rhythm-note-on.playing small {
            color: var(--text);
        }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 0.75rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-size: 1rem; transition: 0.2s; }
        .btn-rand {
            background: rgba(124, 58, 237, 0.22);
            color: var(--text);
            border: 2px solid var(--violet-500);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
        }
        .btn-rand:hover {
            filter: brightness(1.06);
            background: rgba(124, 58, 237, 0.32);
            box-shadow: 0 0 16px rgba(139, 92, 246, 0.4);
        }
        .btn-play {
            background: linear-gradient(135deg, var(--emerald-400) 0%, var(--emerald-500) 100%);
            color: #022c22;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        .btn-play:hover { filter: brightness(1.06); }
        .btn-stop {
            background: linear-gradient(135deg, #fb7185 0%, var(--rose-500) 100%);
            color: #fff;
            display: none;
            box-shadow: 0 4px 14px rgba(244, 63, 94, 0.25);
        }
        .btn-stop:hover { filter: brightness(1.06); }
        .randomizer-block { display: flex; flex-direction: column; gap: 10px; }
        .scale-control {
            border-color: var(--violet-500);
            box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.2) inset;
        }
        label.rand-cycle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        label.rand-cycle input { width: auto; height: auto; margin: 0; accent-color: var(--violet-600); flex-shrink: 0; }

        @media (max-width: 860px) {
            .bars-container.many-bars { grid-template-columns: 1fr; }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link a:hover {
            color: var(--violet-400);
            text-decoration: underline;
        }

        /*
         * Телефон: другой формат — «лента тактов».
         * Каждый такт на всю ширину; слоги в одну линию, ячейки делят ширину поровну (как дорожка).
         */
        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: stretch;
            }
            .app-container {
                padding: 14px 12px;
                border-radius: 18px;
                max-width: none;
            }
            .back-link { margin-bottom: 14px; font-size: 0.88rem; }
            h2 { font-size: 1.15rem; margin-bottom: 14px; line-height: 1.25; }
            .settings-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-bottom: 14px;
            }
            .settings-grid label { margin-bottom: 6px; font-size: 0.82rem; }
            .settings-grid select,
            .control-group select {
                padding: 10px 12px;
                font-size: 0.9rem;
                border-radius: 10px;
            }
            .control-group { margin-bottom: 0; }
            .control-group label { font-size: 0.82rem; margin-bottom: 6px; }
            .control-group input[type="range"] { height: 1.35rem; }
            label.rand-cycle { font-size: 0.8rem; gap: 10px; }
            .bars-container {
                grid-template-columns: 1fr !important;
                gap: var(--bars-gap);
                margin: 16px 0;
                overflow: visible;
                padding: 0;
                margin-inline: 0;
            }
            .bar {
                width: 100%;
                max-width: none;
                padding: calc(12px * var(--bar-scale)) calc(10px * var(--bar-scale)) calc(14px * var(--bar-scale));
                border-radius: 14px;
                box-sizing: border-box;
            }
            .bar-title {
                text-align: left;
                margin-bottom: calc(10px * var(--bar-scale));
                font-size: calc(0.7rem * var(--bar-scale));
                letter-spacing: 0.08em;
                line-height: 1.2;
                padding-left: 2px;
            }
            .rhythm-grid {
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                gap: calc(6px * var(--bar-scale));
                justify-content: stretch;
                align-items: stretch;
                width: 100%;
            }
            .cell {
                flex: 1 1 0;
                min-width: 0;
                width: auto;
                max-width: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0;
                padding: calc(12px * var(--bar-scale)) calc(4px * var(--bar-scale)) calc(14px * var(--bar-scale));
                min-height: calc(var(--cell-height) * var(--bar-scale));
                border-radius: 12px;
                border-width: 2px;
                box-sizing: border-box;
            }
            .cell small {
                font-size: calc(0.78rem * var(--bar-scale));
                margin-bottom: 0;
                text-align: center;
                line-height: 1.1;
                font-weight: 700;
                width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .cell.playing {
                transform: scale(1.03);
                box-shadow: 0 0 18px var(--playback-glow);
            }
            .cell.rhythm-note-on.playing {
                box-shadow: 0 0 20px rgba(244, 63, 94, 0.55), 0 0 0 1px rgba(251, 113, 133, 0.35) inset;
            }
            .btn {
                padding: 14px 14px;
                font-size: 0.95rem;
                margin-bottom: 10px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

<div id="pulsationDragPanel" class="pulsation-drag-panel" hidden aria-hidden="true">
    <div class="pulsation-drag-panel-title" id="pulsationDragPanelTitle">Pulsation</div>
    <ul class="pulsation-drag-panel-list" id="pulsationDragPanelList"></ul>
</div>

<div class="app-container">
    <div class="back-link">
        <a href="..">← Retour à Espace Maja</a>
    </div>
    <h2>Rhythm Dictation & Metronome</h2>

    <details class="settings-fold">
        <summary>Settings</summary>
        <div class="settings-fold-content">
            <div class="settings-grid">
                <div>
                    <label>Pulsation:</label>
                    <select id="pulsation" onchange="onGlobalPulsationSelectChange()">
                        <option value="3">3 (Ta-Ki-Ta)</option>
                        <option value="4" selected>4 (Ta-Ka-Dhi-Mi)</option>
                        <option value="5">5 (Ta-Ka-Ta-Ki-Ta)</option>
                        <option value="6">6 (Ta-Ka-Dhi-Mi-Ta-Ka)</option>
                        <option value="7">7 (Ta-Ka-Dhi-Mi-Ta-Ki-Ta)</option>
                        <option value="8">8 (Ta Ka Dhi Mi Ta Ka Dju Na)</option>
                    </select>
                </div>
                <div>
                    <label>Number of Bars:</label>
                    <select id="barsCount" onchange="initApp(); saveSessionState()">
                        <option value="1">1 Bar</option>
                        <option value="2">2 Bars</option>
                        <option value="3">3 Bars</option>
                        <option value="4" selected>4 Bars</option>
                        <option value="5">5 Bars</option>
                        <option value="6">6 Bars</option>
                        <option value="7">7 Bars</option>
                        <option value="8">8 Bars</option>
                    </select>
                </div>
                <div class="randomizer-block">
                    <div>
                        <label for="randNotesPerBar">Random pattern</label>
                        <select id="randNotesPerBar" onchange="saveSessionState()"></select>
                    </div>
                    <label class="rand-cycle">
                        <input type="checkbox" id="randomPatternAfterEachBar" onchange="saveSessionState()" checked>
                        Random pattern after each bar (while playing)
                    </label>
                    <label class="rand-cycle">
                        <input type="checkbox" id="randomPulsationAfterEachBar" onchange="saveSessionState()">
                        Random pulsation after each bar (while playing)
                    </label>
                    <label class="rand-cycle">
                        <input type="checkbox" id="uniformSound" onchange="saveSessionState()">
                        Uniform sound (no checkbox audio cue)
                    </label>
                </div>
            </div>
        </div>
    </details>

    <div class="control-group">
        <label>
            Tempo
            <small class="hint-muted">(interval between syllables, default: 100 BPM)</small>
        </label>
        <input type="range" id="bpm" min="20" max="480" value="100" oninput="updateTempoLabel()">
        <small id="bpmValue" class="hint-muted">Current: 100 BPM</small>
    </div>

    <div class="control-group scale-control">
        <label>
            Bar scaler
        </label>
        <input type="range" id="barScale" min="55" max="100" value="100" oninput="updateBarScaleLabel()">
        <small id="barScaleValue" class="hint-muted">Current: 100%</small>
    </div>

    <div id="barsContainer" class="bars-container"></div>

    <button class="btn btn-rand" onclick="randomizeAndPlay()">🎲 RANDOMIZE PATTERN</button>
    <button id="playBtn" class="btn btn-play" onclick="start(false)">▶ PLAY</button>
    <button id="stopBtn" class="btn btn-stop" onclick="stop()">■ STOP</button>
</div>

<script>
    let audioCtx = null;
    let nextNoteTime = 0.0;
    let timerID = null;
    let currentStep = 0;
    let lastFocusedBarIndex = -1;
    let playbackRandomizerEnabled = false;
    let barStates = [];
    let stepMeta = [];
    let pulsationMenuBarIndex = null;
    let lastProcessedUiPaintKey = '';
    let playbackUiEventSeq = 0;
    let lastAppliedPlaybackUiSeq = 0;
    let lastPaintedPlaybackMeta = null;
    let playbackCompletedCycles = 0;
    /** Сколько раз за текущий незавершённый круг вызвали оркестратор на границах тактов (localIndex===0). Должно стать ровно bCount за полный круг. */
    let cycleBoundaryMutations = 0;
    let lastInternalPlaybackLogKey = '';
    let allowPlaybackPulsationMutation = false;
    let wakeLock = null;
    let settingsFoldAutoCloseTimer = null;
    const BASE_PULSATION_FOR_BPM = 4;
    const SETTINGS_FOLD_AUTO_CLOSE_MS = 5000;
    const STORAGE_KEY = 'konnakolSessionStateV1';
    
    const syllables = {
        3: ["Ta", "Ki", "Ta"],
        4: ["Ta", "Ka", "Dhi", "Mi"],
        5: ["Ta", "Ka", "Ta", "Ki", "Ta"],
        6: ["Ta", "Ka", "Dhi", "Mi", "Ta", "Ka"],
        7: ["Ta", "Ka", "Dhi", "Mi", "Ta", "Ki", "Ta"],
        8: ["Ta", "Ka", "Dhi", "Mi", "Ta", "Ka", "Dju", "Na"]
    };

    class PlaybackInvariantViolation extends Error {
        constructor(message) {
            super(message);
            this.name = 'PlaybackInvariantViolation';
        }
    }

    function clearInternalPlaybackErrorAttrs() {
        const c = document.getElementById('barsContainer');
        if (c) {
            delete c.dataset.playbackError;
            delete c.dataset.playbackErrorAt;
        }
    }

    function hidePlaybackFatalError() {
        clearInternalPlaybackErrorAttrs();
    }

    function showPlaybackFatalError(message) {
        const msg = String(message);
        console.error('[konnakol playback]', msg);
        const c = document.getElementById('barsContainer');
        if (c) {
            c.dataset.playbackError = msg.slice(0, 500);
            c.dataset.playbackErrorAt = String(Date.now());
        }
    }

    function resetInternalPlaybackIndicators() {
        lastInternalPlaybackLogKey = '';
        const c = document.getElementById('barsContainer');
        if (!c) return;
        delete c.dataset.playbackBar;
        delete c.dataset.playbackBeat;
        delete c.dataset.playbackPulsation;
        delete c.dataset.playbackSyllable;
        clearInternalPlaybackErrorAttrs();
    }

    function isPlaybackRunning() {
        const stopBtn = document.getElementById('stopBtn');
        return Boolean(stopBtn && stopBtn.style.display === 'block');
    }

    function findGlobalStepIndexForMeta(meta) {
        if (!meta || !barStates[meta.barIndex]) return -1;
        for (let i = 0; i < stepMeta.length; i++) {
            if (stepMeta[i].barIndex === meta.barIndex && stepMeta[i].localIndex === meta.localIndex) return i;
        }
        return -1;
    }

    /**
     * После смены пульсации длина stepMeta меняется, а currentStep остаётся от старой сетки — планировщик «ломает» порядок.

    function resyncCurrentStepAfterOrchestration(anchorMeta) {
        const idx = findGlobalStepIndexForMeta(anchorMeta);
        if (idx < 0 || !stepMeta.length) return;
        currentStep = (idx + 1) % stepMeta.length;
        if (audioCtx && nextNoteTime < audioCtx.currentTime) {
            nextNoteTime = audioCtx.currentTime + 0.05;
        }

    function emitInternalPlaybackStep(barIndex, localIndex) {
        const p = barStates[barIndex] ? barStates[barIndex].pulsation : 0;
        const syllable = (syllables[p] || [])[localIndex] || '';
        const key = `${barIndex}|${localIndex}`;
        if (lastInternalPlaybackLogKey !== key) {
            lastInternalPlaybackLogKey = key;
            console.debug('[konnakol playback]', { barIndex, localIndex, pulsation: p, syllable });
        }
        const c = document.getElementById('barsContainer');
        if (c) {
            c.dataset.playbackBar = String(barIndex);

    function setPlayingCellByBarLocal(barIndex, localIndex) {
        const container = document.getElementById('barsContainer');
        if (!container) return false;
        const el = container.querySelector(`.cell[data-bar-index="${barIndex}"][data-local-index="${localIndex}"]`);
        if (!el) {
            throw new PlaybackInvariantViolation(
                `Playback cell missing in DOM (Bar ${barIndex + 1}, beat ${localIndex + 1}). Stopping.`
            );
        }
        container.querySelectorAll('.cell.playing').forEach(c => c.classList.remove('playing'));
        el.classList.add('playing');
        emitInternalPlaybackStep(barIndex, localIndex);

    function notesCountLabel(n) {

    function getCurrentSessionState() {
        const p = parseInt(document.getElementById('pulsation').value, 10);
        const bCount = parseInt(document.getElementById('barsCount').value, 10);
        const barPulsations = barStates.map(b => b.pulsation);
        const checks = barStates.flatMap(b => b.checks);
        return {
            pulsation: String(p),
            barsCount: String(bCount),
            randNotesPerBar: document.getElementById('randNotesPerBar').value || 'random',
            randomPatternAfterEachBar: document.getElementById('randomPatternAfterEachBar').checked,
            randomPulsationAfterEachBar: document.getElementById('randomPulsationAfterEachBar').checked,
            uniformSound: document.getElementById('uniformSound').checked,
            bpm: String(document.getElementById('bpm').value || '100'),
            barScaleByCount: getBarScaleMapForSave(),
            barPulsations,
            checks
        };

    function normalizeBarScaleValue(v) {
        const n = parseInt(v, 10);
        if (isNaN(n)) return '100';
        return String(Math.max(55, Math.min(100, n)));
    }

    function defaultBarScaleMap() {
        return {
            1: '100',
            2: '100',
            3: '100',
            4: '100',
            5: '100',
            6: '100',
            7: '100',
            8: '100'
        };
    }

    function getBarScaleMapForSave() {
        const state = loadSessionState();
        const map = defaultBarScaleMap();
        if (state && state.barScaleByCount && typeof state.barScaleByCount === 'object') {
            for (let i = 1; i <= 8; i++) {
                if (state.barScaleByCount[i] !== undefined) {
                    map[i] = normalizeBarScaleValue(state.barScaleByCount[i]);
                }
            }
        } else if (state && state.barScale !== undefined) {
            // Backward compatibility with old single-scale format
            for (let i = 1; i <= 8; i++) map[i] = normalizeBarScaleValue(state.barScale);
        }
        const currentBars = parseInt(document.getElementById('barsCount').value, 10);
        map[currentBars] = normalizeBarScaleValue(document.getElementById('barScale').value);
        return map;
    }

    function saveSessionState() {
        try {

        }
    }

    function loadSessionState() {
        try {

    function applySessionStateToControls(state) {

        const pulsationEl = document.getElementById('pulsation');

        const bpmEl = document.getElementById('bpm');

        const randomPatternAfterEachBarEl = document.getElementById('randomPatternAfterEachBar');
        const randomPulsationAfterEachBarEl = document.getElementById('randomPulsationAfterEachBar');
        const uniformSoundEl = document.getElementById('uniformSound');

        if (state.pulsation && syllables[state.pulsation]) {
            pulsationEl.value = String(state.pulsation);
        }
        if (state.barsCount) {
            const b = parseInt(state.barsCount, 10);
            if (!isNaN(b) && b >= 1 && b <= 8) barsCountEl.value = String(b);
        }
        if (state.bpm) {
            const bpm = parseInt(state.bpm, 10);
            if (!isNaN(bpm)) bpmEl.value = String(Math.max(20, Math.min(480, bpm)));
        }
        let initialScale = '100';
        if (state.barScaleByCount && typeof state.barScaleByCount === 'object') {
            const currentBars = parseInt(barsCountEl.value, 10);
            initialScale = normalizeBarScaleValue(state.barScaleByCount[currentBars]);
        } else if (state.barScale) {
            initialScale = normalizeBarScaleValue(state.barScale);
        }
        barScaleEl.value = initialScale;
        if (randomPatternAfterEachBarEl) {
            if (state.randomPatternAfterEachBar !== undefined) {
                randomPatternAfterEachBarEl.checked = Boolean(state.randomPatternAfterEachBar);
            } else if (state.randomEachCycle !== undefined) {
                randomPatternAfterEachBarEl.checked = Boolean(state.randomEachCycle);
            } else {
                randomPatternAfterEachBarEl.checked = true;
            }
        }
        if (randomPulsationAfterEachBarEl) {
            randomPulsationAfterEachBarEl.checked = state.randomPulsationAfterEachBar === undefined
                ? false
                : Boolean(state.randomPulsationAfterEachBar);
        }
        uniformSoundEl.checked = Boolean(state.uniformSound);

    function rebuildRandomNotesSelect() {
        const p = parseInt(document.getElementById('pulsation').value);
        const sel = document.getElementById('randNotesPerBar');
        const patternBarCb = document.getElementById('randomPatternAfterEachBar');
        const prevRaw = sel.value;
        let nextVal = prevRaw;
        if (!prevRaw) {
            nextVal = p === 4 ? '2' : 'random';
        }
        if (prevRaw === 'cycle_random') {
            if (patternBarCb) patternBarCb.checked = true;
            nextVal = 'random';
        } else if (/^cycle_\d+$/.test(prevRaw)) {
            if (patternBarCb) patternBarCb.checked = true;
            nextVal = prevRaw.slice(6);
        }
        sel.innerHTML = '';
        const optRand = document.createElement('option');
        optRand.value = 'random';
        optRand.textContent = 'Random';
        sel.appendChild(optRand);
        for (let k = 0; k <= p; k++) {
            const o = document.createElement('option');
            o.value = String(k);
            o.textContent = 'Exactly ' + notesCountLabel(k);
            sel.appendChild(o);
        }
        if (nextVal === 'random') {
            sel.value = 'random';
        } else {
            const n = parseInt(nextVal, 10);
            sel.value = !isNaN(n) && n >= 0 && n <= p ? String(n) : 'random';

    function shuffleInPlace(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const t = a[i];
            a[i] = a[j];
            a[j] = t;
        }
        return a;
    }

    function initializeBarStates(defaultPulsation, bCount, options = {}) {
        const state = loadSessionState();
        const defaultBar = () => ({ pulsation: defaultPulsation, checks: Array.from({ length: defaultPulsation }, () => false) });
        barStates = Array.from({ length: bCount }, () => defaultBar());

        if (!state) {
            recalcStepMeta();
            return;
        }

        const hasBarPulsations = !options.ignorePerBarPulsationsFromSession
            && Array.isArray(state.barPulsations)
            && state.barPulsations.length === bCount;
        if (hasBarPulsations) {
            for (let i = 0; i < bCount; i++) {
                const p = parseInt(state.barPulsations[i], 10);
                const safeP = syllables[p] ? p : defaultPulsation;
                barStates[i] = { pulsation: safeP, checks: Array.from({ length: safeP }, () => false) };
            }
        }

        const totalExpected = barStates.reduce((sum, b) => sum + b.pulsation, 0);
        if (Array.isArray(state.checks) && state.checks.length === totalExpected) {
            let idx = 0;
            for (let b = 0; b < bCount; b++) {
                for (let i = 0; i < barStates[b].pulsation; i++) {
                    barStates[b].checks[i] = Boolean(state.checks[idx++]);
                }
            }
        } else if (Array.isArray(state.checks) && !hasBarPulsations) {
            const oldExpected = defaultPulsation * bCount;
            if (state.checks.length === oldExpected) {
                let idx = 0;
                for (let b = 0; b < bCount; b++) {
                    for (let i = 0; i < defaultPulsation; i++) {
                        barStates[b].checks[i] = Boolean(state.checks[idx++]);
                    }
                }
            }
        }

        recalcStepMeta();
    }

    function assertPlaybackPulsationMutationAllowed(barIndex, oldP, newP) {
        if (oldP === newP) return;
        const isPlaying = document.getElementById('stopBtn').style.display === 'block';
        if (!isPlaying) return;
        if (allowPlaybackPulsationMutation) return;
        throw new Error(`Illegal pulsation mutation during playback at applyBarPulsation(bar=${barIndex}, oldP=${oldP}, newP=${newP})`);
    }

    function recalcStepMeta() {
        stepMeta = [];
        for (let b = 0; b < barStates.length; b++) {
            const p = barStates[b].pulsation;
            for (let i = 0; i < p; i++) {
                stepMeta.push({ barIndex: b, localIndex: i });
            }
        }
    }

    function renderBars(container) {
        recalcStepMeta();
        container.innerHTML = '';
        let globalStep = 0;
        for (let b = 0; b < barStates.length; b++) {
            const barDiv = document.createElement('div');
            barDiv.className = 'bar';
            barDiv.id = `bar-${b}`;
            barDiv.dataset.barIndex = String(b);
            barDiv.innerHTML = `<div class="bar-title">Bar ${b + 1} · <span class="pulsation-handle" id="pulsation-handle-${b}" onclick="togglePulsationMenu(event, ${b})">P${barStates[b].pulsation}</span></div>`;

            const grid = document.createElement('div');
            grid.className = 'rhythm-grid';

            const p = barStates[b].pulsation;
            syllables[p].forEach((s, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell' + (barStates[b].checks[i] ? ' rhythm-note-on' : '');
                cell.dataset.barIndex = String(b);
                cell.dataset.localIndex = String(i);
                cell.id = `step-${globalStep}`;
                cell.setAttribute('role', 'button');
                cell.setAttribute('tabindex', '0');
                cell.setAttribute('aria-pressed', barStates[b].checks[i] ? 'true' : 'false');
                cell.setAttribute('aria-label', `${s}, bar ${b + 1}, beat ${i + 1}`);
                const label = document.createElement('small');
                label.textContent = s;
                cell.appendChild(label);
                cell.addEventListener('click', (ev) => toggleRhythmCell(ev, b, i));
                cell.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter' || ev.key === ' ') {
                        ev.preventDefault();
                        toggleRhythmCell(ev, b, i);
                    }
                });
                grid.appendChild(cell);
                globalStep += 1;
            });

            barDiv.appendChild(grid);
            container.appendChild(barDiv);
        }
    }

    function mapChecksToNewPulsation(oldChecks, oldP, newP) {
        if (oldP === newP) return oldChecks.slice();
        const mapped = Array.from({ length: newP }, () => false);
        for (let i = 0; i < oldChecks.length; i++) {
            if (!oldChecks[i]) continue;
            const j = Math.min(newP - 1, Math.floor((i * newP) / oldP));
            mapped[j] = true;
        }
        return mapped;
    }

    function setBarPulsationManual(barIndex, newP) {
        if (!barStates[barIndex]) return;
        const n = parseInt(String(newP), 10);
        if (!Number.isFinite(n)) return;
        const safeP = Math.min(8, Math.max(3, n));
        const oldP = barStates[barIndex].pulsation;
        if (oldP === safeP) return;
        const oldChecks = barStates[barIndex].checks.slice();
        barStates[barIndex].pulsation = safeP;
        barStates[barIndex].checks = mapChecksToNewPulsation(oldChecks, oldP, safeP);
        const container = document.getElementById('barsContainer');
        renderBars(container);
        requestAnimationFrame(() => enforceBarsFit(container, barStates.length));
        saveSessionState();
        if (navigator.vibrate) navigator.vibrate(10);
    }

    function positionPulsationDragPanel(barIndex) {

        if (!panel || !handle) return;
        const rect = handle.getBoundingClientRect();
        const panelWidth = panel.offsetWidth || 120;
        const panelHeight = panel.offsetHeight || 180;
        const viewportW = window.innerWidth;
        const viewportH = window.innerHeight;
        let left = rect.right + 8;
        let top = rect.top - 6;
        if (left + panelWidth > viewportW - 8) left = rect.left - panelWidth - 8;
        if (left < 8) left = 8;
        if (top + panelHeight > viewportH - 8) top = viewportH - panelHeight - 8;
        if (top < 8) top = 8;
        panel.style.left = `${left}px`;
        panel.style.top = `${top}px`;

        // In random playback, slider BPM is interpreted as tempo for 4-pulse bar.
        // Each bar gets its internal tempo via pulsation ratio.
        const barPulsation = barStates[barIndex].pulsation;

    function getAllowedBarsHeight(container) {
        const rect = container.getBoundingClientRect();

    function applyAdaptiveBarHeights(container, bCount) {
        const allowedHeight = getAllowedBarsHeight(container);
        const totalHeightRatioByCount = {
            1: 0.44,
            2: 0.56,
            3: 0.68,
            4: 0.79,
            5: 0.90,
            6: 0.88,
            7: 0.86,
            8: 0.84
        };
        const gapByCount = {
            1: 18,
            2: 17,
            3: 16,
            4: 15,
            5: 14,
            6: 13,
            7: 12,
            8: 11
        };
        const { rows } = getBarsLayoutMeta(bCount);

        const totalHeightFor5 = Math.floor(allowedHeight * totalHeightRatioByCount[5]);
        let totalHeight = Math.floor(allowedHeight * (totalHeightRatioByCount[bCount] || totalHeightRatioByCount[5]));
        if (bCount === 8) totalHeight = Math.min(totalHeight, totalHeightFor5);
        const gap = gapByCount[bCount] || gapByCount[5];
        const freeHeight = totalHeight - (Math.max(0, rows - 1) * gap);
        const barHeight = Math.max(58, Math.floor(freeHeight / Math.max(1, rows)));
        const cellHeight = Math.max(38, Math.floor(barHeight * 0.62));

        container.style.setProperty('--bars-gap', `${gap}px`);
        container.style.setProperty('--bar-height', `${barHeight}px`);
        container.style.setProperty('--cell-height', `${cellHeight}px`);
        // #region agent log
        fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'pre-fix-1',hypothesisId:'H2',location:'maja/public/konnakol/index.html:applyAdaptiveBarHeights',message:'Computed adaptive sizes',data:{bCount,allowedHeight,rows,totalHeightFor5,totalHeight,gap,freeHeight,barHeight,cellHeight,innerHeight:window.innerHeight},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
    }

    function enforceBarsFit(container, bCount) {
        const allowedHeight = getAllowedBarsHeight(container);
        const beforeScrollHeight = container.scrollHeight;
        let barHeight = parseInt(container.style.getPropertyValue('--bar-height'), 10);
        let cellHeight = parseInt(container.style.getPropertyValue('--cell-height'), 10);
        let gap = parseInt(container.style.getPropertyValue('--bars-gap'), 10);

        if (isNaN(barHeight) || isNaN(cellHeight) || isNaN(gap)) return;

        let safety = 0;
        while (container.scrollHeight > allowedHeight && safety < 18) {
            barHeight = Math.max(52, barHeight - 3);
            cellHeight = Math.max(34, cellHeight - 2);
            gap = Math.max(8, gap - 1);
            container.style.setProperty('--bar-height', `${barHeight}px`);
            container.style.setProperty('--cell-height', `${cellHeight}px`);
            container.style.setProperty('--bars-gap', `${gap}px`);
            safety += 1;
        }

        // Поддерживаем требование: 8 баров не выше режима 5 баров по целевой сумме.
        if (bCount === 8) {
            const expectedFor5 = Math.floor(getAllowedBarsHeight(container) * 0.90);
            if (container.scrollHeight > expectedFor5) {
                const scale = expectedFor5 / Math.max(1, container.scrollHeight);
                const scaledBar = Math.max(52, Math.floor(barHeight * scale));
                const scaledCell = Math.max(34, Math.floor(cellHeight * scale));
                container.style.setProperty('--bar-height', `${scaledBar}px`);
                container.style.setProperty('--cell-height', `${scaledCell}px`);
            }
        }
        // #region agent log
        fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'pre-fix-1',hypothesisId:'H3',location:'maja/public/konnakol/index.html:enforceBarsFit',message:'Post-fit measurements',data:{bCount,allowedHeight,beforeScrollHeight,afterScrollHeight:container.scrollHeight,barHeight:container.style.getPropertyValue('--bar-height'),cellHeight:container.style.getPropertyValue('--cell-height'),gap:container.style.getPropertyValue('--bars-gap'),iterations:safety},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
    }

    function parsePatternSpec() {
        const v = document.getElementById('randNotesPerBar').value;
        const p = parseInt(document.getElementById('pulsation').value);
        if (v === 'random') return { mode: 'random' };
        const n = parseInt(v, 10);
        if (!isNaN(n) && n >= 0 && n <= p) return { mode: 'exact', n };
        return { mode: 'random' };
    }

    function getPlaybackRandomizerFlags() {
        return {
            randomPatternAfterEachBar: Boolean(document.getElementById('randomPatternAfterEachBar')?.checked),
            randomPulsationAfterEachBar: Boolean(document.getElementById('randomPulsationAfterEachBar')?.checked)
        };
    }

    function getRandomPulsationValueDifferentFrom(excludeP) {
        const values = Object.keys(syllables).map(v => parseInt(v, 10)).filter(v => !isNaN(v));
        const pool = values.filter(v => v !== excludeP);
        const pickFrom = pool.length ? pool : values;
        return pickFrom[Math.floor(Math.random() * pickFrom.length)] || 4;
    }

    function maybeRandomizePulsationForBar(barIndex, sliderBaseP, enabled) {
        if (!enabled || !barStates[barIndex]) return;
        const nextP = getRandomPulsationValueDifferentFrom(barStates[barIndex].pulsation);
        applyBarPulsation(barIndex, nextP, sliderBaseP);
    }

    function maybeRandomizePatternForBar(barIndex, spec, enabled) {
        if (!enabled || !barStates[barIndex]) return;
        applyBarPattern(barIndex, spec);
    }

    function onBarTransitionOrchestrate({ spec, flags, prevBar, sliderP, bCount, pulsationRandomAllowed }) {
        allowPlaybackPulsationMutation = true;
        try {
            maybeRandomizePulsationForBar(prevBar, sliderP, pulsationRandomAllowed);
            maybeRandomizePatternForBar(prevBar, spec, flags.randomPatternAfterEachBar);
        } finally {
            allowPlaybackPulsationMutation = false;
        }
        const container = document.getElementById('barsContainer');
        renderBars(container);
        lastInternalPlaybackLogKey = '';
        requestAnimationFrame(() => enforceBarsFit(container, bCount));
        saveSessionState();
    }

    function applyBarPulsation(barIndex, nextP, fallbackP) {
        if (!barStates[barIndex]) return false;
        const safeP = Math.min(8, Math.max(3, parseInt(nextP, 10) || fallbackP || barStates[barIndex].pulsation));
        const oldP = barStates[barIndex].pulsation;
        assertPlaybackPulsationMutationAllowed(barIndex, oldP, safeP);
        if (oldP === safeP) return false;
        const oldChecks = barStates[barIndex].checks.slice();
        barStates[barIndex].pulsation = safeP;
        barStates[barIndex].checks = mapChecksToNewPulsation(oldChecks, oldP, safeP);
        return true;
    }

    function applyBarPattern(barIndex, spec) {
        if (!barStates[barIndex]) return;
        const safeP = barStates[barIndex].pulsation;

        if (spec.mode === 'random') {
            for (let i = 0; i < safeP; i++) {
                const densityBias = safeP > 4 ? 0.56 : 0.62;
                barStates[barIndex].checks[i] = Math.random() > densityBias;
            }
            return;
        }

        const n = Math.min(Math.max(0, spec.n), safeP);
        const localIdx = Array.from({ length: safeP }, (_, i) => i);
        shuffleInPlace(localIdx);
        const chosen = new Set(localIdx.slice(0, n));
        for (let i = 0; i < safeP; i++) {
            barStates[barIndex].checks[i] = chosen.has(i);
        }
    }

    function applyRandomPattern() {
        const spec = parsePatternSpec();
        const p = parseInt(document.getElementById('pulsation').value);
        for (let b = 0; b < barStates.length; b++) {
            applyBarPulsation(b, p, p);
            applyBarPattern(b, spec);
        }
        const container = document.getElementById('barsContainer');
        renderBars(container);
        requestAnimationFrame(() => enforceBarsFit(container, barStates.length));
    }

    function randomize() {
        applyRandomPattern();
        saveSessionState();
    }

    function randomizeAndPlay() {
        randomize();
        const isPlaying = document.getElementById('stopBtn').style.display === 'block';
        // #region agent log
        fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'cycle-debug-3',hypothesisId:'H5',location:'maja/public/konnakol/index.html:randomizeAndPlay',message:'Randomize-and-play entry state',data:{isPlaying,randomPatternAfterEachBar:Boolean(document.getElementById('randomPatternAfterEachBar')?.checked),randomPulsationAfterEachBar:Boolean(document.getElementById('randomPulsationAfterEachBar')?.checked),barsCount:barStates.length},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
        if (!isPlaying) {
            start(true);
        } else {
            playbackRandomizerEnabled = true;
        }
    }

    function playSharpClick(time, isChecked) {
        if (!audioCtx) audioCtx = new AudioContext();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const uniform = document.getElementById('uniformSound').checked;

        osc.type = 'sine';
        osc.frequency.setValueAtTime(uniform ? 860 : (isChecked ? 920 : 800), time);

        const peak = uniform ? 0.31 : (isChecked ? 0.34 : 0.28);
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(peak, time + 0.002);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(time);
        osc.stop(time + 0.05);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            scheduleNote(currentStep, nextNoteTime);
            nextNote();
        }
        timerID = setTimeout(scheduler, 25);
    }

    function scheduleNote(step, time) {
        const meta = stepMeta[step];
        if (!meta || !barStates[meta.barIndex]) return;
        const isChecked = Boolean(barStates[meta.barIndex].checks[meta.localIndex]);
        const uiDedupKey = `${step}:${time.toFixed(6)}`;
        const metaSnapshot = { barIndex: meta.barIndex, localIndex: meta.localIndex };

        playSharpClick(time, isChecked);

        const evtSeq = ++playbackUiEventSeq;
        const delayMs = Math.max(0, (time - audioCtx.currentTime) * 1000);
        setTimeout(() => {
            try {
                if (!isPlaybackRunning()) return;
                if (evtSeq < lastAppliedPlaybackUiSeq) return;

                if (lastProcessedUiPaintKey === uiDedupKey) {
                    lastAppliedPlaybackUiSeq = Math.max(lastAppliedPlaybackUiSeq, evtSeq);
                    return;
                }
                lastProcessedUiPaintKey = uiDedupKey;

                const bCount = barStates.length;
                const spec = parsePatternSpec();
                const flags = getPlaybackRandomizerFlags();
                const needsMutation = playbackRandomizerEnabled && bCount >= 1
                    && (flags.randomPatternAfterEachBar || flags.randomPulsationAfterEachBar);

                const lastBarIdx = Math.max(0, bCount - 1);
                const lastMeta = lastPaintedPlaybackMeta;
                const lastBarPuls = barStates[lastBarIdx] ? barStates[lastBarIdx].pulsation : 0;
                const fromFullWrap = Boolean(
                    lastMeta
                    && lastBarPuls > 0
                    && lastMeta.barIndex === lastBarIdx
                    && lastMeta.localIndex === lastBarPuls - 1
                    && metaSnapshot.barIndex === 0
                    && metaSnapshot.localIndex === 0
                );

                const coldStartFirstDownbeat = !lastMeta
                    && metaSnapshot.barIndex === 0
                    && metaSnapshot.localIndex === 0;

                if (needsMutation && metaSnapshot.localIndex === 0 && !coldStartFirstDownbeat) {
                    const prevBar = (metaSnapshot.barIndex - 1 + bCount) % bCount;
                    const pulsationRandomAllowed = flags.randomPulsationAfterEachBar;
                    const willOrchestrate = flags.randomPatternAfterEachBar || pulsationRandomAllowed;
                    if (willOrchestrate) {
                        onBarTransitionOrchestrate({
                            spec,
                            flags,
                            prevBar,
                            sliderP: parseInt(document.getElementById('pulsation').value, 10),
                            bCount,
                            pulsationRandomAllowed
                        });
                        cycleBoundaryMutations += 1;
                        resyncCurrentStepAfterOrchestration(metaSnapshot);
                    }
                }

                if (fromFullWrap) {
                    if (needsMutation && playbackCompletedCycles >= 1 && cycleBoundaryMutations !== bCount) {
                        console.warn('[konnakol playback] cycleBoundaryMutations mismatch', {
                            expected: bCount,
                            actual: cycleBoundaryMutations,
                            completedCycles: playbackCompletedCycles
                        });
                    }
                    playbackCompletedCycles += 1;
                    cycleBoundaryMutations = 0;
                }

                setPlayingCellByBarLocal(metaSnapshot.barIndex, metaSnapshot.localIndex);
                lastPaintedPlaybackMeta = { barIndex: metaSnapshot.barIndex, localIndex: metaSnapshot.localIndex };
                lastAppliedPlaybackUiSeq = evtSeq;
            } catch (e) {
                if (e && e.name === 'PlaybackInvariantViolation') {
                    showPlaybackFatalError(e.message);
                    stop();
                    return;
                }
                throw e;
            }
        }, delayMs);
    }

    function nextNote() {
        const baseBpm = parseFloat(document.getElementById('bpm').value);
        const totalSteps = stepMeta.length;
        if (!totalSteps) return;
        const meta = stepMeta[currentStep];
        const effectiveBpm = meta ? getEffectiveBpmForBar(meta.barIndex, baseBpm) : baseBpm;
        nextNoteTime += 60.0 / effectiveBpm;
        currentStep = (currentStep + 1) % totalSteps;
    }

    function start(enableRandomizer = false) {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const flags = getPlaybackRandomizerFlags();
        playbackRandomizerEnabled = Boolean(enableRandomizer || flags.randomPatternAfterEachBar || flags.randomPulsationAfterEachBar);
        lastProcessedUiPaintKey = '';
        playbackUiEventSeq = 0;
        lastAppliedPlaybackUiSeq = 0;
        lastPaintedPlaybackMeta = null;
        playbackCompletedCycles = 0;
        cycleBoundaryMutations = 0;
        hidePlaybackFatalError();
        document.querySelectorAll('.cell.playing').forEach(c => c.classList.remove('playing'));
        resetInternalPlaybackIndicators();
        currentStep = 0;
        lastFocusedBarIndex = -1;
        nextNoteTime = audioCtx.currentTime + 0.05;
        // #region agent log
        fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'cycle-debug-3',hypothesisId:'H6',location:'maja/public/konnakol/index.html:start',message:'Playback started with mode flags',data:{enableRandomizer,playbackRandomizerEnabled,randomPatternAfterEachBar:Boolean(document.getElementById('randomPatternAfterEachBar')?.checked),randomPulsationAfterEachBar:Boolean(document.getElementById('randomPulsationAfterEachBar')?.checked),barsCount:barStates.length},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
        scheduler();
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        requestWakeLock();
    }

    function stop() {
        clearTimeout(timerID);
        playbackRandomizerEnabled = false;
        lastProcessedUiPaintKey = '';
        playbackUiEventSeq = 0;
        lastAppliedPlaybackUiSeq = 0;
        lastPaintedPlaybackMeta = null;
        playbackCompletedCycles = 0;
        cycleBoundaryMutations = 0;
        lastFocusedBarIndex = -1;
        resetInternalPlaybackIndicators();
        document.querySelectorAll('.cell.playing').forEach(c => c.classList.remove('playing'));
        document.getElementById('playBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        releaseWakeLock();
    }

    const savedState = loadSessionState();
    // #region agent log
    fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'cycle-debug-2',hypothesisId:'H0',location:'maja/public/konnakol/index.html:bootstrap',message:'Cycle debug instrumentation active',data:{version:'cycle-queue-v2'},timestamp:Date.now()})}).catch(()=>{});
    // #endregion
    applySessionStateToControls(savedState);
    updateBarScaleLabel();
    initApp();
    restoreSelectState(savedState);
    updateTempoLabel();
    saveSessionState();

    const settingsFoldEl = document.querySelector('details.settings-fold');
    if (settingsFoldEl) {
        settingsFoldEl.addEventListener('toggle', () => {
            if (settingsFoldAutoCloseTimer !== null) {
                clearTimeout(settingsFoldAutoCloseTimer);
                settingsFoldAutoCloseTimer = null;
            }
            if (settingsFoldEl.open) {
                settingsFoldAutoCloseTimer = setTimeout(() => {
                    settingsFoldAutoCloseTimer = null;
                    if (settingsFoldEl.open) settingsFoldEl.open = false;
                }, SETTINGS_FOLD_AUTO_CLOSE_MS);
            }
        });
    }

    window.addEventListener('resize', () => {
        const bCount = parseInt(document.getElementById('barsCount').value, 10);
        const container = document.getElementById('barsContainer');
        container.classList.toggle('many-bars', bCount >= 6);
        applyAdaptiveBarHeights(container, bCount);
        requestAnimationFrame(() => enforceBarsFit(container, bCount));
        // #region agent log
        fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'pre-fix-1',hypothesisId:'H4',location:'maja/public/konnakol/index.html:resizeHandler',message:'Resize triggered recalculation',data:{bCount,innerHeight:window.innerHeight,innerWidth:window.innerWidth},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
    });
    const pulsationDragPanelListEl = document.getElementById('pulsationDragPanelList');
    if (pulsationDragPanelListEl) {
        pulsationDragPanelListEl.addEventListener('click', (event) => {
            const row = event.target.closest ? event.target.closest('li[data-p]') : null;
            if (!row || !pulsationDragPanelListEl.contains(row)) return;
            event.preventDefault();
            event.stopPropagation();
            const p = parseInt(row.getAttribute('data-p'), 10);
            if (!Number.isFinite(p) || p < 3 || p > 8) return;
            selectPulsationFromMenu(p);
        });
    }
    const pulsationDragPanelRoot = document.getElementById('pulsationDragPanel');
    if (pulsationDragPanelRoot) {
        pulsationDragPanelRoot.addEventListener('mousedown', (event) => {
            event.stopPropagation();
        });
        pulsationDragPanelRoot.addEventListener('click', (event) => {
            event.stopPropagation();
        });
    }
    document.addEventListener('click', (event) => {
        const panel = document.getElementById('pulsationDragPanel');
        if (!panel || panel.hidden) return;
        const target = event.target;
        if (target && target.closest && target.closest('#pulsationDragPanel')) return;
        if (target && target.closest && target.closest('.pulsation-handle')) return;
        endPulsationDrag();
    });
    document.addEventListener('visibilitychange', () => {
        const isPlaying = document.getElementById('stopBtn').style.display === 'block';
        if (document.visibilityState === 'visible' && isPlaying) {
            requestWakeLock();
        }
    });
</script>
