<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konnakol Multi-Bar Trainer</title>
    <style>
        :root {
            --bg-deep: #0f0618;
            --bg-mid: #1a0f28;
            --bg-high: #251538;
            --panel: #1e142e;
            --panel-elevated: #2a1f3d;
            --border: #4a3d63;
            --text: #ece8f4;
            --text-muted: #a99bc8;
            --text-dim: #7d6f9a;
            --primary: #9b87ff;
            --primary-dim: #6b5aae;
            --accent: #3dd68c;
            --danger: #e8556d;
        }
        html { min-height: 100%; color-scheme: dark; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(165deg, var(--bg-deep) 0%, var(--bg-mid) 40%, var(--bg-high) 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            box-sizing: border-box;
        }
        .app-container {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(155, 135, 255, 0.06) inset;
            width: 100%;
            max-width: 600px;
        }
        h2 { text-align: center; margin-bottom: 25px; color: var(--text); font-weight: 600; letter-spacing: 0.02em; }

        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: var(--text-muted); }
        label .hint-muted { font-weight: 400; color: var(--text-dim); }
        select, input[type="range"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--panel-elevated);
            color: var(--text);
        }
        select { cursor: pointer; }
        input[type="range"] { padding: 0; height: 1.25rem; accent-color: var(--primary); }

        .bars-container { display: flex; flex-direction: column; gap: 20px; margin: 25px 0; }
        .bar {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
        }
        .bar-title { font-size: 0.75rem; font-weight: bold; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }

        .rhythm-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; }
        .cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--panel-elevated);
            padding: 8px;
            border-radius: 8px;
            width: 42px;
            transition: 0.1s;
            border: 2px solid transparent;
        }
        .cell small { font-size: 0.65rem; margin-bottom: 5px; font-weight: bold; color: var(--text-muted); }
        .cell.playing {
            background: var(--primary-dim);
            color: var(--text);
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(155, 135, 255, 0.35);
            transform: translateY(-2px);
        }
        .cell input { cursor: pointer; width: 18px; height: 18px; accent-color: var(--primary); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 1rem; transition: 0.2s; }
        .btn-rand { background: linear-gradient(180deg, #7d6ae0 0%, var(--primary-dim) 100%); color: var(--text); }
        .btn-rand:hover { filter: brightness(1.08); }
        .btn-play { background: linear-gradient(180deg, #4ae89a 0%, var(--accent) 100%); color: #0a1620; }
        .btn-play:hover { filter: brightness(1.06); }
        .btn-stop { background: linear-gradient(180deg, #f06b82 0%, var(--danger) 100%); color: var(--text); display: none; }
        .btn-stop:hover { filter: brightness(1.06); }
        .randomizer-block { display: flex; flex-direction: column; gap: 10px; }
        label.rand-cycle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        label.rand-cycle input { width: auto; height: auto; margin: 0; accent-color: var(--primary); flex-shrink: 0; }

        .back-link {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /*
         * Телефон: другой формат — «лента тактов».
         * Каждый такт на всю ширину; слоги в одну линию, ячейки делят ширину поровну (как дорожка).
         */
        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: stretch;
            }
            .app-container {
                padding: 14px 12px;
                border-radius: 18px;
                max-width: none;
            }
            .back-link { margin-bottom: 14px; font-size: 0.88rem; }
            h2 { font-size: 1.15rem; margin-bottom: 14px; line-height: 1.25; }
            .settings-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-bottom: 14px;
            }
            .settings-grid label { margin-bottom: 6px; font-size: 0.82rem; }
            .settings-grid select,
            .control-group select {
                padding: 10px 12px;
                font-size: 0.9rem;
                border-radius: 10px;
            }
            .control-group { margin-bottom: 0; }
            .control-group label { font-size: 0.82rem; margin-bottom: 6px; }
            .control-group input[type="range"] { height: 1.35rem; }
            label.rand-cycle { font-size: 0.8rem; gap: 10px; }
            .bars-container {
                flex-direction: column;
                flex-wrap: nowrap;
                align-items: stretch;
                gap: 14px;
                margin: 16px 0;
                overflow: visible;
                padding: 0;
                margin-inline: 0;
            }
            .bar {
                width: 100%;
                max-width: none;
                padding: 12px 10px 14px;
                border-radius: 14px;
                box-sizing: border-box;
            }
            .bar-title {
                text-align: left;
                margin-bottom: 10px;
                font-size: 0.7rem;
                letter-spacing: 0.08em;
                line-height: 1.2;
                padding-left: 2px;
            }
            .rhythm-grid {
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                gap: 6px;
                justify-content: stretch;
                align-items: stretch;
                width: 100%;
            }
            .cell {
                flex: 1 1 0;
                min-width: 0;
                width: auto;
                max-width: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 12px 4px 14px;
                min-height: 88px;
                border-radius: 12px;
                border-width: 2px;
                box-sizing: border-box;
            }
            .cell small {
                font-size: 0.78rem;
                margin-bottom: 0;
                text-align: center;
                line-height: 1.1;
                font-weight: 700;
                width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .cell input {
                width: 24px;
                height: 24px;
                flex-shrink: 0;
                margin: 0;
            }
            .cell.playing {
                transform: scale(1.03);
                box-shadow: 0 0 16px rgba(155, 135, 255, 0.55);
            }
            .btn {
                padding: 14px 14px;
                font-size: 0.95rem;
                margin-bottom: 10px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="back-link">
        <a href="..">← Retour à Espace Maja</a>
    </div>
    <h2>Rhythm Dictation & Metronome</h2>

    <div class="settings-grid">
        <div>
            <label>Pulsation:</label>
            <select id="pulsation" onchange="initApp()">
                <option value="4">4 (Ta-Ka-Di-Mi)</option>
                <option value="5">5 (Ta-Ka-Ta-Ki-Ta)</option>
                <option value="6">6 (Ta-Ka-Dhi-Mi-Ta-Ka)</option>
                <option value="7">7 (Ta-Ka-Dhi-Mi-Ta-Ki-Ta)</option>
            </select>
        </div>
        <div>
            <label>Number of Bars:</label>
            <select id="barsCount" onchange="initApp()">
                <option value="2">2 Bars</option>
                <option value="3">3 Bars</option>
                <option value="4" selected>4 Bars</option>
                <option value="5">5 Bars</option>
                <option value="6">6 Bars</option>
                <option value="7">7 Bars</option>
                <option value="8">8 Bars</option>
            </select>
        </div>
        <div class="randomizer-block">
            <div>
                <label for="randNotesPerBar">Random pattern</label>
                <select id="randNotesPerBar"></select>
            </div>
            <label class="rand-cycle">
                <input type="checkbox" id="randomEachCycle">
                New pattern each full cycle (while playing)
            </label>
        </div>
    </div>

    <div class="control-group">
        <label>Tempo <small class="hint-muted">(interval between syllables)</small></label>
        <input type="range" id="bpm" min="20" max="480" value="100">
    </div>

    <label class="rand-cycle" style="margin: 12px 0 4px;">
        <input type="checkbox" id="autoScrollToBar">
        Auto-scroll to the current bar while playing
    </label>

    <div id="barsContainer" class="bars-container"></div>

    <button class="btn btn-rand" onclick="randomize()">🎲 RANDOMIZE PATTERN</button>
    <button id="playBtn" class="btn btn-play" onclick="start()">▶ PLAY</button>
    <button id="stopBtn" class="btn btn-stop" onclick="stop()">■ STOP</button>
</div>

<script>
    let audioCtx = null;
    let nextNoteTime = 0.0;
    let timerID = null;
    let currentStep = 0;
    let lastFocusedBarIndex = -1;
    
    const syllables = {
        4: ["Ta", "Ka", "Di", "Mi"],
        5: ["Ta", "Ka", "Ta", "Ki", "Ta"],
        6: ["Ta", "Ka", "Dhi", "Mi", "Ta", "Ka"],
        7: ["Ta", "Ka", "Dhi", "Mi", "Ta", "Ki", "Ta"]
    };

    function notesCountLabel(n) {
        return n + (n === 1 ? ' note' : ' notes');
    }

    function rebuildRandomNotesSelect() {
        const p = parseInt(document.getElementById('pulsation').value);
        const sel = document.getElementById('randNotesPerBar');
        const cycleCb = document.getElementById('randomEachCycle');
        const prevRaw = sel.value;
        let nextVal = prevRaw;
        if (prevRaw === 'cycle_random') {
            cycleCb.checked = true;
            nextVal = 'random';
        } else if (/^cycle_\d+$/.test(prevRaw)) {
            cycleCb.checked = true;
            nextVal = prevRaw.slice(6);
        }
        sel.innerHTML = '';
        const optRand = document.createElement('option');
        optRand.value = 'random';
        optRand.textContent = 'Random';
        sel.appendChild(optRand);
        for (let k = 0; k <= p; k++) {
            const o = document.createElement('option');
            o.value = String(k);
            o.textContent = 'Exactly ' + notesCountLabel(k);
            sel.appendChild(o);
        }
        if (nextVal === 'random') {
            sel.value = 'random';
        } else {
            const n = parseInt(nextVal, 10);
            sel.value = !isNaN(n) && n >= 0 && n <= p ? String(n) : 'random';
        }
    }

    function shuffleInPlace(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const t = a[i];
            a[i] = a[j];
            a[j] = t;
        }
        return a;
    }

    function initApp() {
        const p = parseInt(document.getElementById('pulsation').value);
        const bCount = parseInt(document.getElementById('barsCount').value);
        const container = document.getElementById('barsContainer');
        container.innerHTML = '';

        for (let b = 0; b < bCount; b++) {
            const barDiv = document.createElement('div');
            barDiv.className = 'bar';
            barDiv.id = `bar-${b}`;
            barDiv.dataset.barIndex = String(b);
            barDiv.innerHTML = `<div class="bar-title">Bar ${b + 1}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'rhythm-grid';
            
            syllables[p].forEach((s, i) => {
                const stepIdx = (b * p) + i;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `step-${stepIdx}`;
                cell.innerHTML = `<small>${s}</small><input type="checkbox" id="check-${stepIdx}">`;
                grid.appendChild(cell);
            });
            
            barDiv.appendChild(grid);
            container.appendChild(barDiv);
        }
        currentStep = 0;
        lastFocusedBarIndex = -1;
        rebuildRandomNotesSelect();
    }

    function parseRandomSelect() {
        const v = document.getElementById('randNotesPerBar').value;
        const p = parseInt(document.getElementById('pulsation').value);
        const eachCycle = document.getElementById('randomEachCycle').checked;
        if (v === 'random') return { eachCycle, mode: 'random' };
        const n = parseInt(v, 10);
        if (!isNaN(n) && n >= 0 && n <= p) return { eachCycle, mode: 'exact', n };
        return { eachCycle, mode: 'random' };
    }

    function applyRandomPattern() {
        const spec = parseRandomSelect();
        const p = parseInt(document.getElementById('pulsation').value);
        const bCount = parseInt(document.getElementById('barsCount').value);

        if (spec.mode === 'random') {
            for (let i = 0; i < p * bCount; i++) {
                document.getElementById(`check-${i}`).checked = Math.random() > 0.6;
            }
            return;
        }

        const n = Math.min(Math.max(0, spec.n), p);
        for (let b = 0; b < bCount; b++) {
            const localIdx = Array.from({ length: p }, (_, i) => i);
            shuffleInPlace(localIdx);
            const chosen = new Set(localIdx.slice(0, n));
            for (let i = 0; i < p; i++) {
                document.getElementById(`check-${b * p + i}`).checked = chosen.has(i);
            }
        }
    }

    function randomize() {
        applyRandomPattern();
    }

    function playSharpClick(time, isChecked) {
        if (!audioCtx) audioCtx = new AudioContext();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(isChecked ? 920 : 800, time);

        const peak = isChecked ? 0.34 : 0.28;
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(peak, time + 0.002);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(time);
        osc.stop(time + 0.05);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            scheduleNote(currentStep, nextNoteTime);
            nextNote();
        }
        timerID = setTimeout(scheduler, 25);
    }

    function focusBarForStep(step) {
        const autoCb = document.getElementById('autoScrollToBar');
        if (!autoCb || !autoCb.checked) return;
        const p = parseInt(document.getElementById('pulsation').value, 10);
        const barIndex = Math.floor(step / p);
        if (barIndex === lastFocusedBarIndex) return;
        lastFocusedBarIndex = barIndex;
        const barEl = document.getElementById(`bar-${barIndex}`);
        if (!barEl) return;
        const mobile = window.matchMedia('(max-width: 600px)').matches;
        barEl.scrollIntoView({
            behavior: 'smooth',
            block: mobile ? 'center' : 'nearest',
            inline: 'nearest'
        });
    }

    function scheduleNote(step, time) {
        const p = parseInt(document.getElementById('pulsation').value);
        const isChecked = document.getElementById(`check-${step}`).checked;

        playSharpClick(time, isChecked);

        setTimeout(() => {
            const el = document.getElementById(`step-${step}`);
            if (el) {
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('playing'));
                el.classList.add('playing');
                focusBarForStep(step);
            }
        }, (time - audioCtx.currentTime) * 1000);
    }

    function nextNote() {
        const bpm = parseFloat(document.getElementById('bpm').value);
        const p = parseInt(document.getElementById('pulsation').value);
        const totalSteps = p * parseInt(document.getElementById('barsCount').value);
        nextNoteTime += 60.0 / bpm;
        const prev = currentStep;
        currentStep = (currentStep + 1) % totalSteps;
        if (currentStep === 0 && prev === totalSteps - 1 && parseRandomSelect().eachCycle) {
            applyRandomPattern();
        }
    }

    function start() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        currentStep = 0;
        lastFocusedBarIndex = -1;
        nextNoteTime = audioCtx.currentTime + 0.05;
        scheduler();
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
    }

    function stop() {
        clearTimeout(timerID);
        lastFocusedBarIndex = -1;
        document.getElementById('playBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('playing'));
    }

    initApp();
</script>
</body>
</html>
