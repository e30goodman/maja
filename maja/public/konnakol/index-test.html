<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konnakol (test)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Палитра как на Espace Maja (Tailwind slate + violet + blue) */
        :root {
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-500: #64748b;
            --slate-400: #94a3b8;
            --slate-200: #e2e8f0;
            --violet-400: #a78bfa;
            --violet-500: #8b5cf6;
            --violet-600: #7c3aed;
            --blue-600: #2563eb;
            --blue-500: #3b82f6;
            --emerald-500: #10b981;
            --emerald-400: #34d399;
            --rose-500: #f43f5e;
            --rose-400: #fb7185;
            --playback-bg: rgba(244, 63, 94, 0.2);
            --playback-bg-strong: rgba(244, 63, 94, 0.3);
            --playback-border: #fb7185;
            --playback-glow: rgba(244, 63, 94, 0.48);
            --panel: #0f172a;
            --border: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --primary: #8b5cf6;
            --primary-dim: #7c3aed;
            --accent: #10b981;
        }
        html { min-height: 100%; color-scheme: dark; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            background-color: var(--slate-900);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            pointer-events: none;
            z-index: 0;
            width: 50%;
            height: 50%;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
        }
        body::before {
            top: -10%;
            left: -10%;
            background: rgb(30 58 138);
        }
        body::after {
            bottom: -10%;
            right: -10%;
            background: rgb(76 29 149);
        }
        .app-container {
            position: relative;
            z-index: 1;
            background: var(--panel);
            border: 1px solid var(--slate-700);
            padding: 30px;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.08) inset;
            width: 100%;
            max-width: 600px;
        }
        h2 { text-align: center; margin-bottom: 25px; color: var(--text); font-weight: 600; letter-spacing: 0.02em; }

        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .settings-fold {
            margin: 10px 0 14px;
            border: 1px solid var(--slate-700);
            border-radius: 0.75rem;
            background: rgba(30, 41, 59, 0.28);
            overflow: hidden;
        }
        .top-fold-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            align-items: start;
            margin: 10px 0 14px;
        }
        .top-fold-row .settings-fold {
            margin: 0;
        }
        .top-fold-row.single-main,
        .top-fold-row.single-scaler {
            grid-template-columns: 1fr;
        }
        .top-fold-row.single-main #barScalerFold {
            display: none;
        }
        .top-fold-row.single-scaler #mainSettingsFold {
            display: none;
        }
        .settings-fold summary {
            cursor: pointer;
            list-style: none;
            font-weight: 700;
            color: var(--text);
            padding: 12px 14px;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid transparent;
            user-select: none;
        }
        .settings-fold[open] summary { border-bottom-color: var(--slate-700); }
        .settings-fold summary::-webkit-details-marker { display: none; }
        .settings-fold-content { padding: 14px 14px 6px; }
        .control-group {
            margin: 12px 0;
            padding: 10px 12px;
            border: 1px solid var(--slate-700);
            border-radius: 0.75rem;
            background: rgba(30, 41, 59, 0.35);
        }
        .control-group.tempo-x2 {
            border-color: var(--rose-500);
            box-shadow: 0 0 0 1px rgba(244, 63, 94, 0.22) inset;
        }
        .control-group.tempo-x2 input[type="range"] {
            accent-color: var(--rose-500);
        }
        .tempo-readout {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tempo-x2-badge {
            color: var(--rose-400);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: var(--text-muted); }
        label .hint-muted { font-weight: 400; color: var(--text-dim); }
        select, input[type="range"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 0.75rem;
            border: 1px solid var(--slate-700);
            background: var(--slate-800);
            color: var(--text);
        }
        select { cursor: pointer; }
        select:focus, input[type="range"]:focus {
            outline: none;
            border-color: var(--violet-500);
        }
        input[type="range"] { padding: 0; height: 1.25rem; accent-color: var(--violet-600); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--slate-800); }
        ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5b21b6; }

        .bars-container {
            --bars-count: 4;
            --bar-height: 96px;
            --cell-height: 62px;
            --bars-gap: 16px;
            --bar-scale: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: calc(var(--bars-gap) * var(--bar-scale));
            margin: 25px 0;
        }
        .bars-container.many-bars { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .bar {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--slate-700);
            padding: calc(clamp(10px, calc(19px - (var(--bars-count) * 1px)), 15px) * var(--bar-scale));
            border-radius: calc(1rem * var(--bar-scale));
            min-height: calc(var(--bar-height) * var(--bar-scale));
        }
        .bar.tempo-boost {
            border-color: var(--playback-border);
            box-shadow: 0 0 0 1px rgba(244, 63, 94, 0.24) inset, 0 0 12px rgba(244, 63, 94, 0.2);
            background: rgba(244, 63, 94, 0.10);
        }
        .bar.tempo-boost-x3 {
            border-color: #f43f5e;
            box-shadow: 0 0 0 1px rgba(244, 63, 94, 0.34) inset, 0 0 18px rgba(244, 63, 94, 0.34);
            background: rgba(244, 63, 94, 0.18);
        }
        .bar-title {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            min-height: calc(22px * var(--bar-scale));
            font-size: calc(0.75rem * var(--bar-scale));
            font-weight: bold;
            color: var(--text-dim);
            margin-bottom: calc(10px * var(--bar-scale));
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .bar-tempo-handle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            width: calc(40px * var(--bar-scale));
            min-width: calc(40px * var(--bar-scale));
            height: calc(22px * var(--bar-scale));
            padding: 0;
            border-radius: calc(999px * var(--bar-scale));
            border: 1px solid rgba(148, 163, 184, 0.65);
            background: rgba(51, 65, 85, 0.28);
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            touch-action: none;
            font-weight: 700;
            line-height: 1;
            transition: transform 0.12s ease, color 0.12s ease, text-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
        }
        .bar-tempo-handle:hover {
            background: rgba(51, 65, 85, 0.4);
            border-color: rgba(148, 163, 184, 0.9);
        }
        .bar-tempo-handle.hold-active {
            transform: scale(1.08);
            text-shadow: 0 0 10px rgba(148, 163, 184, 0.28);
            background: rgba(51, 65, 85, 0.5);
        }
        .bar-tempo-handle.x3 {
            color: var(--text);
            border-color: rgba(226, 232, 240, 0.9);
            background: rgba(51, 65, 85, 0.62);
            box-shadow: 0 0 12px rgba(148, 163, 184, 0.26);
        }
        .pulsation-handle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 6px;
            min-width: calc(32px * var(--bar-scale));
            height: calc(22px * var(--bar-scale));
            padding: 0 calc(8px * var(--bar-scale));
            border-radius: calc(999px * var(--bar-scale));
            border: 1px solid rgba(139, 92, 246, 0.55);
            background: rgba(124, 58, 237, 0.16);
            color: #c4b5fd;
            cursor: pointer;
            user-select: none;
            touch-action: none;
            font-weight: 700;
            line-height: 1;
            transition: transform 0.12s ease, color 0.12s ease, text-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
        }
        .pulsation-handle:hover {
            background: rgba(139, 92, 246, 0.24);
            border-color: rgba(196, 181, 253, 0.82);
        }
        .pulsation-handle.dragging {
            color: #c4b5fd;
            transform: scale(1.12);
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
            background: rgba(139, 92, 246, 0.3);
            border-color: rgba(196, 181, 253, 0.95);
        }

        .pulsation-drag-panel {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 60;
            width: min(64px, 20vw);
            max-height: min(48vh, 280px);
            overflow-y: auto;
            padding: 8px;
            border-radius: 0.6rem;
            border: 1px solid var(--slate-600);
            background: rgba(15, 23, 42, 0.92);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(139, 92, 246, 0.15) inset;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text);
            font-size: 0.72rem;
            pointer-events: auto;
        }
        .pulsation-drag-panel[hidden] { display: none !important; }
        .pulsation-drag-panel-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .pulsation-drag-panel-list li {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            padding: 5px 4px;
            margin-bottom: 3px;
            border-radius: 0.5rem;
            background: rgba(30, 41, 59, 0.55);
            border: 1px solid transparent;
            font-variant-numeric: tabular-nums;
            cursor: pointer;
        }
        .pulsation-drag-panel-list li.active {
            border-color: var(--violet-500);
            background: rgba(124, 58, 237, 0.2);
            color: var(--text);
        }
        .pulsation-drag-panel-list .p-label { font-weight: 700; color: var(--text-muted); }
        .pulsation-drag-panel-list li.active .p-label { color: var(--violet-400); }

        .rhythm-grid {
            display: flex;
            flex-wrap: wrap;
            gap: calc(clamp(5px, calc(10px - (var(--bars-count) * 0.4px)), 8px) * var(--bar-scale));
            justify-content: flex-start;
        }
        .cell {
            --cell-box-size-default: calc(var(--cell-height) * var(--bar-scale));
            --cell-label-reserve: 0px;
            --cell-box-size-x2: calc(var(--cell-box-size-default) + var(--cell-label-reserve));
            --cell-box-size-x3: calc(var(--cell-box-size-default) + var(--cell-label-reserve));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--slate-800);
            padding: calc(clamp(6px, calc(10px - (var(--bars-count) * 0.45px)), 8px) * var(--bar-scale));
            border-radius: calc(0.5rem * var(--bar-scale));
            width: calc(clamp(32px, calc(48px - (var(--bars-count) * 1.45px)), 42px) * var(--bar-scale));
            min-height: var(--cell-box-size-default);
            transition: 0.1s;
            border: 2px solid transparent;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .cell.cell-profile-default {
            min-height: var(--cell-box-size-default);
        }
        .cell.cell-profile-x2 {
            min-height: var(--cell-box-size-x2);
        }
        .cell.cell-profile-x3 {
            min-height: var(--cell-box-size-x3);
        }
        .cell:focus-visible {
            outline: 2px solid var(--violet-400);
            outline-offset: 2px;
        }
        .cell small {
            font-size: calc(clamp(0.55rem, calc(0.74rem - (var(--bars-count) * 0.015rem)), 0.65rem) * var(--bar-scale));
            margin-bottom: 0;
            font-weight: 600;
            color: var(--text-muted);
        }
        .cell small.subdiv-label {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            font-size: calc(clamp(0.48rem, calc(0.66rem - (var(--bars-count) * 0.015rem)), 0.58rem) * var(--bar-scale));
            letter-spacing: 0.02em;
            line-height: 1.05;
            white-space: pre-line;
            text-align: center;
            margin: 0;
            pointer-events: none;
        }
        .cell small.subdiv-label.dense {
            font-size: calc(clamp(0.42rem, calc(0.58rem - (var(--bars-count) * 0.015rem)), 0.5rem) * var(--bar-scale));
        }
        .cell.rhythm-note-on {
            border-color: var(--violet-500);
            background: rgba(124, 58, 237, 0.22);
            color: var(--text);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.25);
        }
        .cell.rhythm-note-on small {
            color: var(--text);
        }
        .cell.playing {
            background: var(--playback-bg);
            color: var(--text);
            border-color: var(--playback-border);
            box-shadow: 0 0 14px var(--playback-glow);
            transform: translateY(-2px);
        }
        .cell.playing small {
            color: #fecdd3;
        }
        .cell.rhythm-note-on.playing {
            background: var(--playback-bg-strong);
            border-color: var(--rose-500);
            box-shadow: 0 0 18px rgba(244, 63, 94, 0.58), 0 0 0 1px rgba(251, 113, 133, 0.35) inset;
        }
        .cell.rhythm-note-on.playing small {
            color: var(--text);
        }
        .cell.tempo-boost {
            border-color: var(--playback-border);
            box-shadow: 0 0 0 1px rgba(244, 63, 94, 0.24) inset;
            background: rgba(244, 63, 94, 0.12);
        }
        .cell.tempo-boost-x3 {
            border-color: #f43f5e;
            box-shadow: 0 0 0 1px rgba(244, 63, 94, 0.34) inset, 0 0 12px rgba(244, 63, 94, 0.22);
            background: rgba(244, 63, 94, 0.20);
        }
        .cell-speed-badge {
            position: absolute;
            right: calc(4px * var(--bar-scale));
            bottom: calc(3px * var(--bar-scale));
            font-size: calc(0.52rem * var(--bar-scale));
            line-height: 1;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            pointer-events: none;
            user-select: none;
            opacity: 0.95;
            transform: none;
        }
        .cell-speed-badge.x3 {
            color: var(--text);
        }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 0.75rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-size: 1rem; transition: 0.2s; }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .action-row .btn { margin-bottom: 0; }
        .btn-icon { font-size: 1.15rem; padding: 12px; }
        .btn-icon-img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            pointer-events: none;
            vertical-align: middle;
        }
        .btn-rand {
            background: rgba(51, 65, 85, 0.55);
            color: var(--text-muted);
            border: 2px solid var(--slate-600);
            box-shadow: none;
        }
        .btn-rand.active {
            background: rgba(124, 58, 237, 0.22);
            color: var(--text);
            border-color: var(--violet-500);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
        }
        .btn-play {
            background: linear-gradient(135deg, var(--emerald-400) 0%, var(--emerald-500) 100%);
            color: #022c22;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        .btn-play:hover { filter: brightness(1.06); }
        .btn-stop {
            background: linear-gradient(135deg, #fb7185 0%, var(--rose-500) 100%);
            color: #fff;
            display: none;
            box-shadow: 0 4px 14px rgba(244, 63, 94, 0.25);
        }
        .btn-stop:hover { filter: brightness(1.06); }
        .btn-accent {
            background: rgba(51, 65, 85, 0.55);
            color: var(--text-muted);
            border: 2px solid var(--slate-600);
        }
        .btn-accent.active {
            background: rgba(124, 58, 237, 0.26);
            color: var(--text);
            border-color: var(--violet-500);
            box-shadow: 0 0 14px rgba(139, 92, 246, 0.3);
        }
        .custom-sound-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .custom-sound-panel {
            margin-top: 6px;
            padding: 8px 10px;
            border: 1px solid var(--slate-700);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.45);
        }
        .custom-sound-panel[hidden] { display: none !important; }
        .custom-sound-panel label { font-size: 0.76rem; margin-bottom: 4px; }
        .custom-sound-panel input[type="file"] {
            width: 100%;
            font-size: 0.74rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .dictaphone-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(15, 23, 42, 0.72);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .dictaphone-overlay[hidden] { display: none !important; }
        .dictaphone-card {
            width: min(360px, 100%);
            border-radius: 14px;
            border: 1px solid var(--slate-600);
            background: rgba(30, 41, 59, 0.96);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(139, 92, 246, 0.12) inset;
            padding: 14px 14px 16px;
            color: var(--text);
        }
        .dictaphone-card h3 {
            margin: 0 0 10px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
        }
        .dictaphone-syllable {
            text-align: center;
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            margin: 8px 0 12px;
            color: var(--violet-400);
            text-shadow: 0 0 14px rgba(139, 92, 246, 0.35);
        }
        .dictaphone-count {
            text-align: center;
            font-size: 2.4rem;
            font-weight: 800;
            min-height: 3rem;
            line-height: 1;
            color: var(--text);
            margin: 6px 0 10px;
        }
        .dictaphone-status {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            min-height: 1.2rem;
            margin-bottom: 10px;
        }
        .dictaphone-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .dictaphone-row.dictaphone-after-actions {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            align-items: stretch;
        }
        .dictaphone-row.dictaphone-after-actions > button {
            margin: 0;
            min-width: 0;
            width: 100%;
            box-sizing: border-box;
            min-height: 46px;
            padding: 10px 6px;
            font-size: 0.78rem;
            font-weight: 700;
            border-radius: 0.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1.15;
            text-align: center;
        }
        .dictaphone-row.dictaphone-after-actions .btn-dict-again {
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #fb7185 0%, var(--rose-500) 100%);
            color: #fff;
            box-shadow: 0 3px 10px rgba(244, 63, 94, 0.3);
        }
        .dictaphone-row.dictaphone-after-actions .btn-dict-again:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .dictaphone-row.single { grid-template-columns: 1fr; }
        .btn-dict-rec {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
            background: linear-gradient(135deg, #fb7185 0%, var(--rose-500) 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(244, 63, 94, 0.35);
        }
        .btn-dict-rec:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-dict-close {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 0.65rem;
            border: 1px solid var(--slate-600);
            background: rgba(51, 65, 85, 0.45);
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
        }
        .randomizer-block { display: flex; flex-direction: column; gap: 10px; }
        .scale-control {
            border-color: var(--violet-500);
            box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.2) inset;
        }
        label.rand-cycle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            width: 100%;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(71, 85, 105, 0.45);

        .back-link {
            display: block;

        /*

         * Каждый такт на всю ширину; слоги в одну линию, ячейки делят ширину поровну (как дорожка).
         */
        @media (max-width: 600px) {
            body {
                padding: 10px;

            .control-group select {

            .control-group { margin-bottom: 0; }

            label.rand-cycle { font-size: 0.8rem; gap: 10px; }
            .bars-container {
                grid-template-columns: 1fr !important;
                gap: var(--bars-gap);
                margin: 16px 0;

                padding: 0;

            .bar {
                width: 100%;
                max-width: none;
                padding: calc(12px * var(--bar-scale)) calc(10px * var(--bar-scale)) calc(14px * var(--bar-scale));
                border-radius: 14px;
                box-sizing: border-box;
                min-height: calc(var(--bar-height) * var(--bar-scale));
            }
            .bar-title {
                text-align: left;

            .rhythm-grid {

                --cell-label-reserve: 0px;
                --cell-box-size-x2: calc(var(--cell-box-size-default) + var(--cell-label-reserve));
                --cell-box-size-x3: calc(var(--cell-box-size-default) + var(--cell-label-reserve));

                border-width: 2px;
                box-sizing: border-box;

            .cell small {
                font-size: calc(0.78rem * var(--bar-scale));
                margin-bottom: 0;
                text-align: center;
                line-height: 1.1;

                width: 100%;

            .cell.playing {

    </style>
</head>
<body>

<div id="pulsationDragPanel" class="pulsation-drag-panel" hidden aria-hidden="true">
    <ul class="pulsation-drag-panel-list" id="pulsationDragPanelList"></ul>
</div>

<div class="app-container">
    <!--
    <div class="back-link">
        <a href=".." aria-label="Back">←</a>
    </div>
    -->
    <div class="back-link"><a href="index.html" class="version-link" title="Stable version">v1.01 test</a></div>
    <div id="topFoldRow" class="top-fold-row">
    <details id="mainSettingsFold" class="settings-fold">
        <summary title="Settings">⚙️</summary>
        <div class="settings-fold-content">
            <div class="settings-grid">
                <div>
                    <select id="pulsation" onchange="onGlobalPulsationSelectChange()">
                        <option value="2">2 (Ta-Ka)</option>
                        <option value="3">3 (Ta-Ki-Ta)</option>
                        <option value="4" selected>4 (Ta-Ka-Dhi-Mi)</option>
                        <option value="5">5 (Ta-Ka-Ta-Ki-Ta)</option>
                        <option value="6">6 (Ta-Ka-Dhi-Mi-Ta-Ka)</option>
                        <option value="7">7 (Ta-Ka-Dhi-Mi-Ta-Ki-Ta)</option>
                        <option value="8">8 (Ta Ka Dhi Mi Ta Ka Dju Na)</option>
                    </select>
                </div>
                <div>
                    <select id="barsCount" onchange="initApp(); saveSessionState()">
                        <option value="1">1 Bar</option>
                        <option value="2">2 Bars</option>
                        <option value="3">3 Bars</option>
                        <option value="4" selected>4 Bars</option>
                        <option value="5">5 Bars</option>
                        <option value="6">6 Bars</option>
                        <option value="7">7 Bars</option>
                        <option value="8">8 Bars</option>
                    </select>
                </div>
                <div class="randomizer-block">
                    <div>
                        <select id="randNotesPerBar" onchange="saveSessionState()"></select>
                    </div>
                    <label class="rand-cycle">
                        <input type="checkbox" id="randomPatternAfterEachBar" onchange="onRandomizationFlagsChanged()" checked>
                        Random Pattern
                    </label>
                    <label class="rand-cycle">
                        <input type="checkbox" id="randomPatternSpeedChange" onchange="onRandomizationFlagsChanged()">
                        Random Speed
                    </label>
                    <label class="rand-cycle">
                        <input type="checkbox" id="randomPulsationAfterEachBar" onchange="onRandomizationFlagsChanged()">
                        Random Pulsation
                    </label>
                    <div class="custom-sound-wrap">
                        <label for="soundPreset">Click</label>
                        <select id="soundPreset" onchange="onSoundPresetChange()">
                            <option value="classic">Classic</option>
                            <option value="konnakol_metronome">Old school</option>
                            <option value="custom">Custom</option>
                        </select>
                        <div id="customSoundControls" hidden>
                            <button type="button" class="btn btn-accent" style="margin:0;padding:8px 10px;font-size:0.82rem;" onclick="openDictaphoneWizard()">Custom</button>
                            <div id="customSoundPanel" class="custom-sound-panel" hidden>
                                <label for="customClickFile">Click sound</label>
                                <input id="customClickFile" type="file" accept="audio/*" onchange="onCustomSoundFileSelected(event, 'click')">
                                <label for="customAccentFile">Accent sound</label>
                                <input id="customAccentFile" type="file" accept="audio/*" onchange="onCustomSoundFileSelected(event, 'accent')">

        </div>
    </details>

    <details id="barScalerFold" class="settings-fold">
        <summary title="Bar scaler">📐</summary>

                    Bar scaler
                </label>

                <small id="barScaleValue" class="hint-muted">100%</small>

    </div>

        </label>
        <input type="range" id="bpm" min="20" max="480" value="100" oninput="updateTempoLabel()">
        <div class="tempo-readout">
            <small id="bpmValue" class="hint-muted">100</small>
            <small id="tempoX2Badge" class="tempo-x2-badge" hidden>x2</small>
        </div>
    </div>

    <div id="barsContainer" class="bars-container"></div>

    <div class="action-row">
        <button id="randomModeToggleBtn" class="btn btn-rand btn-icon" onclick="toggleRandomModeFromButton()" title="Random mode">🎲</button>
        <button id="accentToggleBtn" class="btn btn-accent btn-icon" onclick="toggleAccentOnlyFromButton()"><img src="drum0.png" alt="" class="btn-icon-img"></button>
    </div>
    <button id="playBtn" class="btn btn-play" onclick="start(false)">▶ PLAY</button>
    <button id="stopBtn" class="btn btn-stop" onclick="stop()">■ STOP</button>
</div>

<div id="dictaphoneOverlay" class="dictaphone-overlay" hidden aria-hidden="true" onclick="if(event.target===event.currentTarget)closeDictaphoneOverlay()">
    <div class="dictaphone-card" role="dialog" aria-labelledby="dictaphoneTitle" onclick="event.stopPropagation()">
        <h3 id="dictaphoneTitle">Syllable recorder</h3>
        <div id="dictaphoneSyllable" class="dictaphone-syllable">Ta</div>
        <div id="dictaphoneCount" class="dictaphone-count" aria-live="polite"></div>
        <div id="dictaphoneStatus" class="dictaphone-status"></div>
        <div id="dictaphoneRecRow">
            <button type="button" id="dictaphoneRecBtn" class="btn-dict-rec" onclick="dictaphoneStartTake()">● REC</button>
        </div>
        <div id="dictaphoneAfterRow" class="dictaphone-row dictaphone-after-actions" hidden>
            <button type="button" class="btn btn-play" onclick="dictaphonePlayPreview()">▶ Play</button>
            <button type="button" class="btn btn-dict-again" onclick="dictaphoneRecordAgain()">↻ Re-record</button>
            <button type="button" class="btn btn-accent" onclick="dictaphoneNext()">Next</button>
        </div>
        <button type="button" class="btn-dict-close" onclick="closeDictaphoneOverlay()">Close</button>
    </div>

<script>
    let audioCtx = null;
    let nextNoteTime = 0.0;
    let timerID = null;
    let currentStep = 0;
    let lastFocusedBarIndex = -1;
    let playbackRandomizerEnabled = false;
    let barStates = [];
    let stepMeta = [];
    let pulsationMenuBarIndex = null;
    let lastProcessedUiPaintKey = '';
    let playbackUiEventSeq = 0;
    let lastAppliedPlaybackUiSeq = 0;
    let lastKnownRandomPatternEnabled = true;
    let lastPaintedPlaybackMeta = null;
    let playbackCompletedCycles = 0;
    /** Сколько раз за текущий незавершённый круг вызвали оркестратор на границах тактов (localIndex===0). Должно стать ровно bCount за полный круг. */
    let cycleBoundaryMutations = 0;
    let lastInternalPlaybackLogKey = '';
    let allowPlaybackPulsationMutation = false;
    let accentOnlyEnabled = true;
    let wakeLock = null;
    let barScalerAutoCloseTimer = null;
    let barScalerSliderHeld = false;
    let barTempoHoldTimer = null;
    let barTempoHoldTarget = -1;
    let pulsationHoldTimer = null;
    let pulsationHoldBar = -1;
    let suppressPulsationClickBar = -1;
    let cellTempoHoldTimer = null;
    let cellTempoHoldKey = '';
    let suppressCellClickKey = '';
    let tempoDoubleMode = false;
    let randomModeEnabled = false;
    let selectedSoundPreset = 'classic';
    let customClickBuffer = null;
    let customAccentBuffer = null;

    /** Test build: Ta Ka Dhi Mi Ta Ka Dju Na — per-syllable dictaphone for Custom preset */
    const DICT_SYLLABLES = ['Ta', 'Ka', 'Dhi', 'Mi', 'Ta', 'Ka', 'Dju', 'Na'];
    const customSyllableBuffers = {};
    let dictMediaRecorder = null;
    let dictMediaChunks = [];
    let dictMediaStream = null;
    let dictCountdownTimerIds = [];
    let dictRecordStopTimer = null;
    let dictPhase = 'idle';
    let dictCurrentIndex = 0;
    const DICT_COUNT_STEP_MS = 420;
    const DICT_RECORD_MS = 2800;
    const BASE_PULSATION_FOR_BPM = 4;
    const BAR_SCALER_AUTO_CLOSE_MS = 5000;
    const TEMPO_HOLD_MS = 420;
    const STORAGE_KEY = 'konnakolSessionStateV1Test';
    
    const syllables = {
        2: ["Ta", "Ka"],
        3: ["Ta", "Ki", "Ta"],
        4: ["Ta", "Ka", "Dhi", "Mi"],
        5: ["Ta", "Ka", "Ta", "Ki", "Ta"],
        6: ["Ta", "Ka", "Dhi", "Mi", "Ta", "Ka"],
        7: ["Ta", "Ka", "Dhi", "Mi", "Ta", "Ki", "Ta"],
        8: ["Ta", "Ka", "Dhi", "Mi", "Ta", "Ka", "Dju", "Na"]
    };

    class PlaybackInvariantViolation extends Error {
        constructor(message) {
            super(message);
            this.name = 'PlaybackInvariantViolation';
        }
    }

    function clearInternalPlaybackErrorAttrs() {
        const c = document.getElementById('barsContainer');
        if (c) {
            delete c.dataset.playbackError;
            delete c.dataset.playbackErrorAt;
        }
    }

    function hidePlaybackFatalError() {
        clearInternalPlaybackErrorAttrs();
    }

    function showPlaybackFatalError(message) {
        const msg = String(message);
        console.error('[konnakol playback]', msg);
        const c = document.getElementById('barsContainer');
        if (c) {
            c.dataset.playbackError = msg.slice(0, 500);
            c.dataset.playbackErrorAt = String(Date.now());
        }
    }

    function resetInternalPlaybackIndicators() {
        lastInternalPlaybackLogKey = '';
        const c = document.getElementById('barsContainer');
        if (!c) return;
        delete c.dataset.playbackBar;
        delete c.dataset.playbackBeat;
        delete c.dataset.playbackPulsation;
        delete c.dataset.playbackSyllable;
        clearInternalPlaybackErrorAttrs();
    }

    function isPlaybackRunning() {
        const stopBtn = document.getElementById('stopBtn');
        return Boolean(stopBtn && stopBtn.style.display === 'block');
    }

    function findGlobalStepIndexForMeta(meta) {
        if (!meta || !barStates[meta.barIndex]) return -1;
        for (let i = 0; i < stepMeta.length; i++) {
            if (stepMeta[i].barIndex === meta.barIndex && stepMeta[i].localIndex === meta.localIndex) return i;
        }
        return -1;
    }

    /**
     * После смены пульсации длина stepMeta меняется, а currentStep остаётся от старой сетки — планировщик «ломает» порядок.
     * Привязываем currentStep к доле anchorMeta (текущий UI-тик) и следующему шагу в новой сетке.
     */
    function resyncCurrentStepAfterOrchestration(anchorMeta) {
        const idx = findGlobalStepIndexForMeta(anchorMeta);
        if (idx < 0 || !stepMeta.length) return;
        currentStep = (idx + 1) % stepMeta.length;
        if (audioCtx && nextNoteTime < audioCtx.currentTime) {
            nextNoteTime = audioCtx.currentTime + 0.05;
        }
    }

    function emitInternalPlaybackStep(barIndex, localIndex) {
        const p = barStates[barIndex] ? barStates[barIndex].pulsation : 0;
        const syllable = (syllables[p] || [])[localIndex] || '';
        const key = `${barIndex}|${localIndex}`;
        if (lastInternalPlaybackLogKey !== key) {
            lastInternalPlaybackLogKey = key;
            console.debug('[konnakol playback]', { barIndex, localIndex, pulsation: p, syllable });
        }
        const c = document.getElementById('barsContainer');
        if (c) {
            c.dataset.playbackBar = String(barIndex);
            c.dataset.playbackBeat = String(localIndex);
            c.dataset.playbackPulsation = String(p);
            c.dataset.playbackSyllable = syllable;
        }
    }

    function setPlayingCellByBarLocal(barIndex, localIndex) {
        const container = document.getElementById('barsContainer');
        if (!container) return false;
        const el = container.querySelector(`.cell[data-bar-index="${barIndex}"][data-local-index="${localIndex}"]`);
        if (!el) {
            throw new PlaybackInvariantViolation(
                `Playback cell missing in DOM (Bar ${barIndex + 1}, beat ${localIndex + 1}). Stopping.`
            );
        }
        container.querySelectorAll('.cell.playing').forEach(c => c.classList.remove('playing'));
        el.classList.add('playing');
        emitInternalPlaybackStep(barIndex, localIndex);
        return true;
    }

    function closeSettingsFoldIfOpen() {
        const settingsFoldEl = document.getElementById('mainSettingsFold');
        if (settingsFoldEl && settingsFoldEl.open) settingsFoldEl.open = false;
    }

    function refreshAccentToggleButton() {
        const btn = document.getElementById('accentToggleBtn');
        if (!btn) return;
        const playAllEnabled = accentOnlyEnabled;
        btn.classList.toggle('active', playAllEnabled);
        btn.setAttribute('aria-pressed', playAllEnabled ? 'true' : 'false');
        btn.title = '';
    }

    function refreshRandomModeToggleButton() {
        const btn = document.getElementById('randomModeToggleBtn');
        if (!btn) return;
        btn.classList.toggle('active', randomModeEnabled);
        btn.setAttribute('aria-pressed', randomModeEnabled ? 'true' : 'false');
        btn.title = '';
    }

    function computePlaybackRandomizerEnabled() {
        const flags = getPlaybackRandomizerFlags();
        return Boolean(
            randomModeEnabled
            && (flags.randomPatternAfterEachBar || flags.randomPulsationAfterEachBar || flags.randomPatternSpeedChange)
        );
    }

    function toggleRandomModeFromButton() {
        randomModeEnabled = !randomModeEnabled;
        refreshRandomModeToggleButton();
        if (isPlaybackRunning()) {
            playbackRandomizerEnabled = computePlaybackRandomizerEnabled();
        }
        saveSessionState();
    }

    function onRandomizationFlagsChanged() {
        const patternEnabledNow = Boolean(document.getElementById('randomPatternAfterEachBar')?.checked);
        const patternDisabledNow = lastKnownRandomPatternEnabled && !patternEnabledNow;
        lastKnownRandomPatternEnabled = patternEnabledNow;

        // Если Random Pattern выключили во время playback, отменяем уже запланированные
        // callbacks, чтобы прошлые «очереди» перестановки акцентов не отрабатывали.
        if (patternDisabledNow && isPlaybackRunning()) {
            lastAppliedPlaybackUiSeq = playbackUiEventSeq;
            lastProcessedUiPaintKey = '';
        }

        if (randomModeEnabled) {
            playbackRandomizerEnabled = computePlaybackRandomizerEnabled();
            refreshRandomModeToggleButton();
        }
        saveSessionState();
    }

    function toggleAccentOnlyFromButton() {
        accentOnlyEnabled = !accentOnlyEnabled;
        refreshAccentToggleButton();
        saveSessionState();
    }

    function onSoundPresetChange() {
        const el = document.getElementById('soundPreset');
        selectedSoundPreset = el ? (el.value || 'classic') : 'classic';
        const customControls = document.getElementById('customSoundControls');
        const customPanel = document.getElementById('customSoundPanel');
        if (customControls) customControls.hidden = selectedSoundPreset !== 'custom';
        if (customPanel) customPanel.hidden = selectedSoundPreset !== 'custom';
        if (selectedSoundPreset !== 'custom') closeDictaphoneOverlay();
        saveSessionState();
    }

    function toggleCustomSoundPanel() {
        const panel = document.getElementById('customSoundPanel');
        if (!panel) return;
        panel.hidden = !panel.hidden;
    }

    async function decodeCustomAudioFile(file) {
        if (!file) return null;
        const arr = await file.arrayBuffer();
        if (!audioCtx) audioCtx = new AudioContext();
        return await audioCtx.decodeAudioData(arr.slice(0));
    }

    async function onCustomSoundFileSelected(event, kind) {
        const file = event?.target?.files?.[0];
        if (!file) return;
        try {
            const buf = await decodeCustomAudioFile(file);
            if (kind === 'accent') customAccentBuffer = buf;
            else customClickBuffer = buf;
        } catch (e) {
            console.error('[konnakol] custom sound decode failed', e);
        }
    }

    function dictNormalizeSyllableKey(label) {
        if (!label) return '';
        const t = String(label).trim();
        for (let i = 0; i < DICT_SYLLABLES.length; i++) {
            if (DICT_SYLLABLES[i].toLowerCase() === t.toLowerCase()) return DICT_SYLLABLES[i];
        }
        return '';
    }

    function clearDictCountdownTimers() {
        dictCountdownTimerIds.forEach(id => clearTimeout(id));
        dictCountdownTimerIds = [];
        if (dictRecordStopTimer !== null) {
            clearTimeout(dictRecordStopTimer);
            dictRecordStopTimer = null;
        }
    }

    function stopDictMediaRecorderSafe() {
        if (dictMediaRecorder && dictMediaRecorder.state === 'recording') {
            try { dictMediaRecorder.stop(); } catch (_) {}
        }
        dictMediaRecorder = null;
        dictMediaChunks = [];
        if (dictMediaStream) {
            dictMediaStream.getTracks().forEach(tr => { try { tr.stop(); } catch (_) {} });
            dictMediaStream = null;
        }
    }

    function closeDictaphoneOverlay() {
        const ov = document.getElementById('dictaphoneOverlay');
        if (!ov) return;
        clearDictCountdownTimers();
        stopDictMediaRecorderSafe();
        dictPhase = 'idle';
        ov.hidden = true;
        ov.setAttribute('aria-hidden', 'true');
    }

    function dictaphoneUiSet(status, countText) {
        const st = document.getElementById('dictaphoneStatus');
        const ct = document.getElementById('dictaphoneCount');
        if (st) st.textContent = status || '';
        if (ct) ct.textContent = countText != null ? String(countText) : '';
    }

    function dictaphoneRefreshControls() {
        const recRow = document.getElementById('dictaphoneRecRow');
        const afterRow = document.getElementById('dictaphoneAfterRow');
        const recBtn = document.getElementById('dictaphoneRecBtn');
        const sylEl = document.getElementById('dictaphoneSyllable');
        if (!recRow || !afterRow || !recBtn || !sylEl) return;
        const key = DICT_SYLLABLES[dictCurrentIndex] || '';
        sylEl.textContent = key;
        const done = Boolean(customSyllableBuffers[key]);
        if (dictPhase === 'preview' && done) {
            recRow.hidden = true;
            afterRow.hidden = false;
            recBtn.disabled = true;
        } else {
            recRow.hidden = false;
            afterRow.hidden = true;
            recBtn.disabled = dictPhase === 'counting' || dictPhase === 'recording';
        }
    }

    function openDictaphoneWizard() {
        const sel = document.getElementById('soundPreset');
        if (sel && sel.value !== 'custom') {
            sel.value = 'custom';
            onSoundPresetChange();
        }
        const ov = document.getElementById('dictaphoneOverlay');
        if (!ov) return;
        clearDictCountdownTimers();
        stopDictMediaRecorderSafe();
        dictPhase = 'idle';
        dictCurrentIndex = 0;
        for (let i = 0; i < DICT_SYLLABLES.length; i++) {
            if (!customSyllableBuffers[DICT_SYLLABLES[i]]) {
                dictCurrentIndex = i;
                break;
            }
        }
        ov.hidden = false;
        ov.setAttribute('aria-hidden', 'false');
        dictaphoneUiSet('', '');
        dictaphoneRefreshControls();
    }

    function dictaphoneStartTake() {
        if (dictPhase === 'counting' || dictPhase === 'recording') return;
        const key = DICT_SYLLABLES[dictCurrentIndex];
        if (!key) return;
        clearDictCountdownTimers();
        dictPhase = 'counting';
        dictaphoneRefreshControls();
        dictaphoneUiSet('', '');
        const countWords = ['One', 'Two', 'Three', 'Four'];
        for (let n = 1; n <= 4; n++) {
            const tid = setTimeout(() => {
                dictaphoneUiSet('', countWords[n - 1]);
            }, (n - 1) * DICT_COUNT_STEP_MS);
            dictCountdownTimerIds.push(tid);
        }
        const startRecTid = setTimeout(() => {
            dictaphoneUiSet('', 'Go');
            dictaphoneBeginRecording(key);
        }, 4 * DICT_COUNT_STEP_MS + 80);
        dictCountdownTimerIds.push(startRecTid);
    }

    async function dictaphoneBeginRecording(syllableKey) {
        dictPhase = 'recording';
        dictaphoneRefreshControls();
        dictMediaChunks = [];
        try {
            dictMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
            console.error('[dictaphone] mic', e);
            dictaphoneUiSet('Microphone access denied.', '');
            dictPhase = 'idle';
            dictaphoneRefreshControls();
            return;
        }
        dictaphoneUiSet('', '');
        let mime = 'audio/webm';
        if (!MediaRecorder.isTypeSupported(mime)) mime = '';
        dictMediaRecorder = mime ? new MediaRecorder(dictMediaStream, { mimeType: mime }) : new MediaRecorder(dictMediaStream);
        dictMediaRecorder.ondataavailable = (ev) => {
            if (ev.data && ev.data.size) dictMediaChunks.push(ev.data);
        };
        dictMediaRecorder.onstop = async () => {
            dictPhase = 'idle';
            if (dictMediaStream) {
                dictMediaStream.getTracks().forEach(tr => { try { tr.stop(); } catch (_) {} });
                dictMediaStream = null;
            }
            const blob = new Blob(dictMediaChunks, { type: dictMediaRecorder.mimeType || 'audio/webm' });
            dictMediaRecorder = null;
            dictMediaChunks = [];
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                const arr = await blob.arrayBuffer();
                const buf = await audioCtx.decodeAudioData(arr.slice(0));
                customSyllableBuffers[syllableKey] = buf;
                dictPhase = 'preview';
                dictaphoneUiSet('', '');
            } catch (err) {
                console.error('[dictaphone] decode', err);
                dictaphoneUiSet('Could not decode recording.', '');
            }
            dictaphoneRefreshControls();
        };
        dictMediaRecorder.start();
        dictRecordStopTimer = setTimeout(() => {
            dictRecordStopTimer = null;
            if (dictMediaRecorder && dictMediaRecorder.state === 'recording') {
                try { dictMediaRecorder.stop(); } catch (_) {}
            }
        }, DICT_RECORD_MS);
    }

    function dictaphoneRecordAgain() {
        if (dictPhase === 'counting' || dictPhase === 'recording') return;
        const key = DICT_SYLLABLES[dictCurrentIndex];
        if (!key || dictPhase === 'done') return;
        clearDictCountdownTimers();
        stopDictMediaRecorderSafe();
        delete customSyllableBuffers[key];
        dictPhase = 'idle';
        dictaphoneUiSet('', '');
        dictaphoneRefreshControls();
    }

    function dictaphonePlayPreview() {
        const key = DICT_SYLLABLES[dictCurrentIndex];
        const buf = key ? customSyllableBuffers[key] : null;
        if (!buf || !audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t = audioCtx.currentTime + 0.02;
        const src = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        src.buffer = buf;
        gain.gain.setValueAtTime(0.92, t);
        src.connect(gain);
        gain.connect(audioCtx.destination);
        src.start(t);
        src.stop(t + buf.duration + 0.05);
    }

    function dictaphoneNext() {
        dictPhase = 'idle';
        dictaphoneUiSet('', '');
        if (dictCurrentIndex < DICT_SYLLABLES.length - 1) {
            dictCurrentIndex += 1;
            dictaphoneUiSet('', '');
        } else {
            dictaphoneUiSet('All syllables recorded.', '');
            const recRow = document.getElementById('dictaphoneRecRow');
            const afterRow = document.getElementById('dictaphoneAfterRow');
            if (recRow) recRow.hidden = true;
            if (afterRow) afterRow.hidden = true;
            dictPhase = 'done';
            return;
        }
        dictaphoneRefreshControls();
    }

    function normalizeBarScaleValue(v) {
        const n = parseInt(v, 10);
        if (isNaN(n)) return '100';
        return String(Math.max(55, Math.min(100, n)));

    function defaultBarScaleMap() {
        return {
            1: '100',
            2: '100',
            3: '100',
            4: '100',
            5: '100',
            6: '100',
            7: '100',
            8: '100'
        };
    }

    function getBarScaleMapForSave() {
        const state = loadSessionState();
        const map = defaultBarScaleMap();
        if (state && state.barScaleByCount && typeof state.barScaleByCount === 'object') {
            for (let i = 1; i <= 8; i++) {
                if (state.barScaleByCount[i] !== undefined) {
                    map[i] = normalizeBarScaleValue(state.barScaleByCount[i]);
                }
            }
        } else if (state && state.barScale !== undefined) {
            // Backward compatibility with old single-scale format
            for (let i = 1; i <= 8; i++) map[i] = normalizeBarScaleValue(state.barScale);
        }
        const currentBars = parseInt(document.getElementById('barsCount').value, 10);
        map[currentBars] = normalizeBarScaleValue(document.getElementById('barScale').value);
        return map;

    function initializeBarStates(defaultPulsation, bCount, options = {}) {
        const state = loadSessionState();
        const defaultBar = () => ({
            pulsation: defaultPulsation,
            checks: Array.from({ length: defaultPulsation }, () => false),
            tempoMultiplier: 1,
            cellTempoMultipliers: Array.from({ length: defaultPulsation }, () => 1)
        });
        barStates = Array.from({ length: bCount }, () => defaultBar());

        if (!state) {
            recalcStepMeta();
            return;
        }

        const hasBarPulsations = !options.ignorePerBarPulsationsFromSession
            && Array.isArray(state.barPulsations)
            && state.barPulsations.length === bCount;
        if (hasBarPulsations) {
            for (let i = 0; i < bCount; i++) {
                const p = parseInt(state.barPulsations[i], 10);
                const safeP = syllables[p] ? p : defaultPulsation;
                barStates[i] = {
                    pulsation: safeP,
                    checks: Array.from({ length: safeP }, () => false),
                    tempoMultiplier: 1,
                    cellTempoMultipliers: Array.from({ length: safeP }, () => 1)
                };
            }
        }
        if (Array.isArray(state.barTempoMultipliers) && state.barTempoMultipliers.length === bCount) {
            for (let i = 0; i < bCount; i++) {
                const m = parseInt(state.barTempoMultipliers[i], 10);
                barStates[i].tempoMultiplier = (m === 2 || m === 4 || m === 3) ? (m === 3 ? 4 : m) : 1;
            }
        }
        if (Array.isArray(state.cellTempoMultipliers) && state.cellTempoMultipliers.length === bCount) {
            for (let b = 0; b < bCount; b++) {
                const arr = state.cellTempoMultipliers[b];
                if (!Array.isArray(arr)) continue;
                for (let i = 0; i < barStates[b].pulsation; i++) {
                    const m = parseInt(arr[i], 10);
                    barStates[b].cellTempoMultipliers[i] = (m === 2 || m === 4 || m === 3) ? (m === 3 ? 4 : m) : 1;
                }
            }
        }

        const totalExpected = barStates.reduce((sum, b) => sum + b.pulsation, 0);
        if (Array.isArray(state.checks) && state.checks.length === totalExpected) {
            let idx = 0;
            for (let b = 0; b < bCount; b++) {
                for (let i = 0; i < barStates[b].pulsation; i++) {
                    barStates[b].checks[i] = Boolean(state.checks[idx++]);
                }
            }
        } else if (Array.isArray(state.checks) && !hasBarPulsations) {
            const oldExpected = defaultPulsation * bCount;
            if (state.checks.length === oldExpected) {
                let idx = 0;
                for (let b = 0; b < bCount; b++) {
                    for (let i = 0; i < defaultPulsation; i++) {
                        barStates[b].checks[i] = Boolean(state.checks[idx++]);
                    }
                }
            }
        }

        recalcStepMeta();
    }

    function assertPlaybackPulsationMutationAllowed(barIndex, oldP, newP) {
        if (oldP === newP) return;
        const isPlaying = document.getElementById('stopBtn').style.display === 'block';
        if (!isPlaying) return;
        if (allowPlaybackPulsationMutation) return;
        throw new Error(`Illegal pulsation mutation during playback at applyBarPulsation(bar=${barIndex}, oldP=${oldP}, newP=${newP})`);
    }

    function recalcStepMeta() {
        stepMeta = [];
        for (let b = 0; b < barStates.length; b++) {
            const p = barStates[b].pulsation;
            for (let i = 0; i < p; i++) {
                stepMeta.push({ barIndex: b, localIndex: i });
            }
        }
    }

            container.appendChild(barDiv);

    function mapChecksToNewPulsation(oldChecks, oldP, newP) {
        if (oldP === newP) return oldChecks.slice();
        const mapped = Array.from({ length: newP }, () => false);
        let mappedCount = 0;
        for (let i = 0; i < oldChecks.length; i++) {
            if (!oldChecks[i]) continue;
            const j = Math.min(newP - 1, Math.floor((i * newP) / oldP));
            if (!mapped[j]) {
                mapped[j] = true;
                mappedCount += 1;
            }
        }
        // При росте пульсации сохраняем плотность акцентов, добавляя недостающие акценты случайно.
        if (newP > oldP && oldP > 0) {
            const oldCount = oldChecks.reduce((sum, v) => sum + (v ? 1 : 0), 0);
            const targetCount = Math.min(newP, Math.max(mappedCount, Math.round((oldCount / oldP) * newP)));
            if (targetCount > mappedCount) {
                const freeIdx = [];
                for (let i = 0; i < newP; i++) {
                    if (!mapped[i]) freeIdx.push(i);

    function scheduleNote(step, time) {
        const meta = stepMeta[step];
        if (!meta || !barStates[meta.barIndex]) return;
        const isChecked = Boolean(barStates[meta.barIndex].checks[meta.localIndex]);
        const baseBpm = parseFloat(document.getElementById('bpm').value) * (tempoDoubleMode ? 2 : 1);
        const barBpm = getEffectiveBpmForBar(meta.barIndex, baseBpm);
        const stepDuration = 60.0 / Math.max(1e-6, barBpm);
        const cellMult = getCellTempoMultiplier(meta.barIndex, meta.localIndex);
        const uiDedupKey = `${step}:${time.toFixed(6)}`;
        const metaSnapshot = { barIndex: meta.barIndex, localIndex: meta.localIndex };
        const pForSyl = barStates[meta.barIndex].pulsation;
        const syllableKey = (syllables[pForSyl] || [])[meta.localIndex] || '';

        for (let k = 0; k < cellMult; k++) {
            const subClickIsAccent = cellMult > 1 ? true : isChecked;
            playSharpClick(time + (k * stepDuration / cellMult), subClickIsAccent, syllableKey);
        }

        const evtSeq = ++playbackUiEventSeq;
        const delayMs = Math.max(0, (time - audioCtx.currentTime) * 1000);
        setTimeout(() => {
            try {
                if (!isPlaybackRunning()) return;
                if (evtSeq < lastAppliedPlaybackUiSeq) return;

                if (lastProcessedUiPaintKey === uiDedupKey) {
                    lastAppliedPlaybackUiSeq = Math.max(lastAppliedPlaybackUiSeq, evtSeq);
                    return;
                }
                lastProcessedUiPaintKey = uiDedupKey;

                const bCount = barStates.length;
                const spec = parsePatternSpec();
                const flags = getPlaybackRandomizerFlags();
                const needsMutation = playbackRandomizerEnabled && bCount >= 1
                    && (flags.randomPatternAfterEachBar || flags.randomPulsationAfterEachBar || flags.randomPatternSpeedChange);

                const lastBarIdx = Math.max(0, bCount - 1);
                const lastMeta = lastPaintedPlaybackMeta;
                const lastBarPuls = barStates[lastBarIdx] ? barStates[lastBarIdx].pulsation : 0;
                const fromFullWrap = Boolean(
                    lastMeta
                    && lastBarPuls > 0
                    && lastMeta.barIndex === lastBarIdx
                    && lastMeta.localIndex === lastBarPuls - 1
                    && metaSnapshot.barIndex === 0
                    && metaSnapshot.localIndex === 0
                );

                const coldStartFirstDownbeat = !lastMeta
                    && metaSnapshot.barIndex === 0
                    && metaSnapshot.localIndex === 0;

                if (needsMutation && metaSnapshot.localIndex === 0 && !coldStartFirstDownbeat) {
                    const prevBar = (metaSnapshot.barIndex - 1 + bCount) % bCount;
                    const pulsationRandomAllowed = flags.randomPulsationAfterEachBar;
                    const willOrchestrate = flags.randomPatternAfterEachBar || pulsationRandomAllowed || flags.randomPatternSpeedChange;
                    if (willOrchestrate) {
                        onBarTransitionOrchestrate({
                            spec,
                            flags,
                            prevBar,
                            sliderP: parseInt(document.getElementById('pulsation').value, 10),
                            bCount,
                            pulsationRandomAllowed
                        });
                        cycleBoundaryMutations += 1;
                        resyncCurrentStepAfterOrchestration(metaSnapshot);
                    }
                }

                if (fromFullWrap) {
                    if (needsMutation && playbackCompletedCycles >= 1 && cycleBoundaryMutations !== bCount) {
                        console.warn('[konnakol playback] cycleBoundaryMutations mismatch', {
                            expected: bCount,
                            actual: cycleBoundaryMutations,
                            completedCycles: playbackCompletedCycles
                        });
                    }
                    playbackCompletedCycles += 1;
                    cycleBoundaryMutations = 0;
                }

                setPlayingCellByBarLocal(metaSnapshot.barIndex, metaSnapshot.localIndex);
                lastPaintedPlaybackMeta = { barIndex: metaSnapshot.barIndex, localIndex: metaSnapshot.localIndex };
                lastAppliedPlaybackUiSeq = evtSeq;
            } catch (e) {
                if (e && e.name === 'PlaybackInvariantViolation') {
                    showPlaybackFatalError(e.message);
                    stop();
                    return;
                }
                throw e;
            }
        }, delayMs);
    }

    function nextNote() {
        const baseBpm = parseFloat(document.getElementById('bpm').value) * (tempoDoubleMode ? 2 : 1);
        const totalSteps = stepMeta.length;
        if (!totalSteps) return;
        const meta = stepMeta[currentStep];
        const effectiveBpm = meta ? getEffectiveBpmForBar(meta.barIndex, baseBpm) : baseBpm;
        nextNoteTime += 60.0 / effectiveBpm;
        currentStep = (currentStep + 1) % totalSteps;
    }

    function start(enableRandomizer = false) {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        void enableRandomizer;
        playbackRandomizerEnabled = computePlaybackRandomizerEnabled();
        lastProcessedUiPaintKey = '';
        playbackUiEventSeq = 0;
        lastAppliedPlaybackUiSeq = 0;
        lastPaintedPlaybackMeta = null;
        playbackCompletedCycles = 0;
        cycleBoundaryMutations = 0;
        hidePlaybackFatalError();
        document.querySelectorAll('.cell.playing').forEach(c => c.classList.remove('playing'));
        resetInternalPlaybackIndicators();
        currentStep = 0;
        lastFocusedBarIndex = -1;
        nextNoteTime = audioCtx.currentTime + 0.05;
        // #region agent log
        fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'cycle-debug-3',hypothesisId:'H6',location:'maja/public/konnakol/index.html:start',message:'Playback started with mode flags',data:{enableRandomizer,playbackRandomizerEnabled,randomPatternAfterEachBar:Boolean(document.getElementById('randomPatternAfterEachBar')?.checked),randomPulsationAfterEachBar:Boolean(document.getElementById('randomPulsationAfterEachBar')?.checked),barsCount:barStates.length},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
        scheduler();
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        closeSettingsFoldIfOpen();
        requestWakeLock();
    }

    function stop() {
        closeSettingsFoldIfOpen();
        clearTimeout(timerID);
        playbackRandomizerEnabled = false;
        lastProcessedUiPaintKey = '';
        playbackUiEventSeq = 0;
        lastAppliedPlaybackUiSeq = 0;
        lastPaintedPlaybackMeta = null;
        playbackCompletedCycles = 0;
        cycleBoundaryMutations = 0;
        lastFocusedBarIndex = -1;
        resetInternalPlaybackIndicators();
        document.querySelectorAll('.cell.playing').forEach(c => c.classList.remove('playing'));
        document.getElementById('playBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        releaseWakeLock();
    }

    const savedState = loadSessionState();
    // #region agent log
    fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'cycle-debug-2',hypothesisId:'H0',location:'maja/public/konnakol/index.html:bootstrap',message:'Cycle debug instrumentation active',data:{version:'cycle-queue-v2'},timestamp:Date.now()})}).catch(()=>{});
    // #endregion
    applySessionStateToControls(savedState);
    updateBarScaleLabel();
    initApp();
    restoreSelectState(savedState);
    setupTempoDoubleClickToggle();
    updateTempoLabel();
    refreshTempoModeUi();
    refreshRandomModeToggleButton();
    refreshAccentToggleButton();
    saveSessionState();

    const topFoldRowEl = document.getElementById('topFoldRow');
    const mainSettingsFoldEl = document.getElementById('mainSettingsFold');
    const barScalerFoldEl = document.getElementById('barScalerFold');
    const SETTINGS_CLOSE_TRIGGER_COOLDOWN_MS = 3000;
    const SETTINGS_INTERACTION_GUARD_MS = 220;
    let settingsOpenedAtMs = 0;
    let settingsInteractionGuardUntilMs = 0;

    const syncTopFoldRowState = () => {
        if (!topFoldRowEl || !mainSettingsFoldEl || !barScalerFoldEl) return;
        topFoldRowEl.classList.remove('single-main', 'single-scaler');
        if (mainSettingsFoldEl.open) {
            if (barScalerFoldEl.open) barScalerFoldEl.open = false;
            topFoldRowEl.classList.add('single-main');
            return;
        }
        if (barScalerFoldEl.open) {
            if (mainSettingsFoldEl.open) mainSettingsFoldEl.open = false;
            topFoldRowEl.classList.add('single-scaler');
        }
    };

    if (mainSettingsFoldEl) {
        mainSettingsFoldEl.addEventListener('toggle', () => {
            if (mainSettingsFoldEl.open) settingsOpenedAtMs = performance.now();
            syncTopFoldRowState();
        });
        mainSettingsFoldEl.addEventListener('pointerdown', () => {
            settingsInteractionGuardUntilMs = performance.now() + SETTINGS_INTERACTION_GUARD_MS;
        });
        mainSettingsFoldEl.addEventListener('pointerup', () => {
            settingsInteractionGuardUntilMs = performance.now() + SETTINGS_INTERACTION_GUARD_MS;
        });
        mainSettingsFoldEl.addEventListener('pointercancel', () => {
            settingsInteractionGuardUntilMs = performance.now() + SETTINGS_INTERACTION_GUARD_MS;
        });
    }

    const scheduleBarScalerAutoClose = () => {
        if (!barScalerFoldEl || !barScalerFoldEl.open || barScalerSliderHeld) return;
        if (barScalerAutoCloseTimer !== null) {
            clearTimeout(barScalerAutoCloseTimer);
            barScalerAutoCloseTimer = null;
        }
        barScalerAutoCloseTimer = setTimeout(() => {
            barScalerAutoCloseTimer = null;
            if (barScalerFoldEl.open && !barScalerSliderHeld) barScalerFoldEl.open = false;
        }, BAR_SCALER_AUTO_CLOSE_MS);
    };

    if (barScalerFoldEl) {
        barScalerFoldEl.addEventListener('toggle', () => {
            if (barScalerAutoCloseTimer !== null) {
                clearTimeout(barScalerAutoCloseTimer);
                barScalerAutoCloseTimer = null;
            }
            syncTopFoldRowState();
            scheduleBarScalerAutoClose();
        });
    }

    const barScaleSliderEl = document.getElementById('barScale');
    if (barScaleSliderEl) {
        barScaleSliderEl.addEventListener('pointerdown', () => {
            barScalerSliderHeld = true;
            if (barScalerAutoCloseTimer !== null) {
                clearTimeout(barScalerAutoCloseTimer);
                barScalerAutoCloseTimer = null;
            }
        });
        barScaleSliderEl.addEventListener('input', () => {
            if (barScalerAutoCloseTimer !== null) {
                clearTimeout(barScalerAutoCloseTimer);
                barScalerAutoCloseTimer = null;
            }
        });
        const onRelease = () => {
            if (!barScalerSliderHeld) return;
            barScalerSliderHeld = false;
            scheduleBarScalerAutoClose();
        };
        barScaleSliderEl.addEventListener('pointerup', onRelease);
        barScaleSliderEl.addEventListener('pointercancel', onRelease);
    }
    syncTopFoldRowState();

    const closeTopFoldsByOutsideTarget = (target) => {
        if (mainSettingsFoldEl && mainSettingsFoldEl.open) {
            const now = performance.now();
            const settingsGuardActive = now <= settingsInteractionGuardUntilMs;
            const insideMain = target && target.closest && target.closest('#mainSettingsFold');
            const canCloseByTrigger = (performance.now() - settingsOpenedAtMs) >= SETTINGS_CLOSE_TRIGGER_COOLDOWN_MS;
            if (!insideMain && canCloseByTrigger && !settingsGuardActive) mainSettingsFoldEl.open = false;
        }
        if (barScalerFoldEl && barScalerFoldEl.open) {
            if (barScalerSliderHeld) return;
            const insideScaler = target && target.closest && target.closest('#barScalerFold');
            if (!insideScaler) barScalerFoldEl.open = false;
        }
    };

    document.addEventListener('click', (event) => {
        closeTopFoldsByOutsideTarget(event.target);
    });

    const SCROLL_CLOSE_TRIGGER_MS = 200;
    const SCROLL_ACTIVITY_RESET_MS = 120;
    const STRONG_FLING_WHEEL_DELTA = 420;
    const STRONG_FLING_TOUCH_VELOCITY = 1.6;
    const BOTTOM_STOP_EPSILON = 2;
    const WHEEL_SLIDE_END_IDLE_MS = 140;
    let scrollTriggerStartedAt = 0;
    let lastScrollActivityAt = 0;
    let lastTouchY = null;
    let lastTouchTs = 0;
    let closeTopFoldsPendingOnSlideEnd = false;
    let wheelSlideEndTimer = null;

    const isViewportAtBottomStop = () => {
        const doc = document.documentElement;
        const body = document.body;
        const scrollTop = window.pageYOffset || doc.scrollTop || body.scrollTop || 0;
        const scrollHeight = Math.max(
            doc.scrollHeight || 0,
            body.scrollHeight || 0
        );
        const viewportHeight = window.innerHeight || doc.clientHeight || 0;
        return (scrollTop + viewportHeight) >= (scrollHeight - BOTTOM_STOP_EPSILON);
    };

    const markCloseTopFoldsOnSlideEnd = () => {
        closeTopFoldsPendingOnSlideEnd = true;
    };

    const flushPendingTopFoldsClose = () => {
        if (!closeTopFoldsPendingOnSlideEnd) return;
        closeTopFoldsPendingOnSlideEnd = false;
        closeTopFoldsByOutsideTarget(null);
    };

    const closeTopFoldsOnScrollTrigger = () => {
        const now = performance.now();
        if (lastScrollActivityAt && (now - lastScrollActivityAt) > SCROLL_ACTIVITY_RESET_MS) {
            scrollTriggerStartedAt = 0;
        }
        if (!scrollTriggerStartedAt) {
            scrollTriggerStartedAt = now;
        }
        lastScrollActivityAt = now;
        if ((now - scrollTriggerStartedAt) >= SCROLL_CLOSE_TRIGGER_MS) {
            markCloseTopFoldsOnSlideEnd();
            scrollTriggerStartedAt = 0;
            lastScrollActivityAt = 0;
        }
    };
    const onStrongFlingTrigger = () => {
        markCloseTopFoldsOnSlideEnd();
        scrollTriggerStartedAt = 0;
        lastScrollActivityAt = 0;
    };
    const onWheelScrollTrigger = (event) => {
        closeTopFoldsOnScrollTrigger();
        if (
            event
            && event.deltaY > STRONG_FLING_WHEEL_DELTA
            && isViewportAtBottomStop()
        ) {
            onStrongFlingTrigger();
        }
        if (wheelSlideEndTimer !== null) {
            clearTimeout(wheelSlideEndTimer);
            wheelSlideEndTimer = null;
        }
        wheelSlideEndTimer = setTimeout(() => {
            wheelSlideEndTimer = null;
            flushPendingTopFoldsClose();
        }, WHEEL_SLIDE_END_IDLE_MS);
    };
    const onTouchMoveScrollTrigger = (event) => {
        closeTopFoldsOnScrollTrigger();
        const touch = event && event.touches && event.touches[0];
        if (!touch) return;
        const now = performance.now();
        if (lastTouchY !== null && lastTouchTs > 0) {
            const dy = lastTouchY - touch.clientY;
            const dt = Math.max(1, now - lastTouchTs);
            const velocity = dy / dt;
            if (velocity > STRONG_FLING_TOUCH_VELOCITY && isViewportAtBottomStop()) {
                onStrongFlingTrigger();
            }
        }
        lastTouchY = touch.clientY;
        lastTouchTs = now;
    };
    window.addEventListener('scroll', closeTopFoldsOnScrollTrigger, { passive: true });
    window.addEventListener('wheel', onWheelScrollTrigger, { passive: true });
    window.addEventListener('touchmove', onTouchMoveScrollTrigger, { passive: true });
    window.addEventListener('touchend', () => {
        lastTouchY = null;
        lastTouchTs = 0;
        flushPendingTopFoldsClose();
    }, { passive: true });

    window.addEventListener('resize', () => {
        const bCount = parseInt(document.getElementById('barsCount').value, 10);
        const container = document.getElementById('barsContainer');
        container.classList.toggle('many-bars', bCount >= 6);
        applyAdaptiveBarHeights(container, bCount);
        requestAnimationFrame(() => enforceBarsFit(container, bCount));
        // #region agent log
        fetch('http://127.0.0.1:7813/ingest/125cad1d-6ae9-4dbe-8f4f-aefc5f46b805',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'2e9cf4'},body:JSON.stringify({sessionId:'2e9cf4',runId:'pre-fix-1',hypothesisId:'H4',location:'maja/public/konnakol/index.html:resizeHandler',message:'Resize triggered recalculation',data:{bCount,innerHeight:window.innerHeight,innerWidth:window.innerWidth},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
    });
    const pulsationDragPanelListEl = document.getElementById('pulsationDragPanelList');
    if (pulsationDragPanelListEl) {
        pulsationDragPanelListEl.addEventListener('click', (event) => {
            const row = event.target.closest ? event.target.closest('li[data-p]') : null;
            if (!row || !pulsationDragPanelListEl.contains(row)) return;
            event.preventDefault();
            event.stopPropagation();
            const p = parseInt(row.getAttribute('data-p'), 10);
            if (!Number.isFinite(p) || p < 2 || p > 8) return;
            selectPulsationFromMenu(p);
        });
    }
    const pulsationDragPanelRoot = document.getElementById('pulsationDragPanel');
    if (pulsationDragPanelRoot) {
        pulsationDragPanelRoot.addEventListener('mousedown', (event) => {
            event.stopPropagation();
        });
        pulsationDragPanelRoot.addEventListener('click', (event) => {
            event.stopPropagation();
        });
    }
    document.addEventListener('click', (event) => {
        const panel = document.getElementById('pulsationDragPanel');
        if (!panel || panel.hidden) return;
        const target = event.target;
        if (target && target.closest && target.closest('#pulsationDragPanel')) return;
        if (target && target.closest && target.closest('.pulsation-handle')) return;
        endPulsationDrag();
    });
    document.addEventListener('visibilitychange', () => {
        const isPlaying = document.getElementById('stopBtn').style.display === 'block';
        if (document.visibilityState === 'visible' && isPlaying) {
            requestWakeLock();
        }
    });
    document.addEventListener('selectstart', (event) => event.preventDefault());
    document.addEventListener('copy', (event) => event.preventDefault());
    document.addEventListener('cut', (event) => event.preventDefault());
    document.addEventListener('paste', (event) => event.preventDefault());
    document.addEventListener('contextmenu', (event) => event.preventDefault());
</script>
